<script>
  const LIFF_ID = "2008924519-RslRiLoO"; 
  const WORKER_URL = "https://salesmemager.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"];
  
  let globalCardContacts = [];
  let currentUserProfile = null;
  let currentActiveCard = null; 
  let currentUserCard = null; // ⭐ QQ 新增：追蹤並鎖定自己的名片紀錄
  let isAdminMode = false;
  let isProcessing = false;   // ⭐ QQ 新增：防連點防護

  window.showToast = function(msg, isError = false) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.innerHTML = `<span class="material-symbols-outlined icon-filled">${isError ? 'error' : 'info'}</span> ${msg}`;
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all font-bold flex items-center gap-2 w-max max-w-[90vw] ${isError ? 'bg-red-500 text-white border-red-600' : 'bg-slate-800 text-white border-slate-700'} opacity-100 z-[10000]`;
    t.classList.remove('hidden');
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; setTimeout(() => t.classList.add('hidden'), 300); }, 3000); 
  };

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      const profile = await liff.getProfile();
      currentUserProfile = profile;
      isAdminMode = ADMIN_IDS.includes(profile.userId);

      const initData = await fetchAPI('initApp', { 
          userId: profile.userId, 
          reqContacts: true, 
          reqActivities: false 
      });
      
      const userRes = initData.user || { isRegistered: false };
      const contacts = initData.contacts || [];

      if (!isAdminMode && !userRes.isRegistered) {
          window.location.href = 'index.html';
          return;
      }

      currentUserProfile.name = userRes.isRegistered ? (userRes.info['姓名'] || userRes.info.name) : profile.displayName;
      currentUserProfile.industry = userRes.isRegistered ? (userRes.info['業種'] || userRes.info.industry) : '未知';

      globalCardContacts = contacts;
      
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('view-main').classList.remove('hidden');
      
      // ⭐ QQ 更新：尋找使用者的專屬名片，並初始化隱私開關 UI
      let isMyCardPrivate = false;
      currentUserCard = globalCardContacts.find(c => String(c['LINE ID']).trim() === profile.userId || String(c.userId).trim() === profile.userId);
      
      if (currentUserCard && currentUserCard['自訂名片設定']) {
          try {
              const conf = JSON.parse(currentUserCard['自訂名片設定']);
              isMyCardPrivate = conf.isPrivate === true;
          } catch(e) {}
      }

      const matchmakerUi = document.getElementById('matchmaker-ui');
      const privacyLock = document.getElementById('privacy-lock-container');
      const privacyToggle = document.getElementById('fate-privacy-toggle');

      if (privacyToggle) {
          privacyToggle.checked = !isMyCardPrivate;
      }

      // 如果未公開且非管理員，顯示鎖定畫面
      if (isMyCardPrivate && !isAdminMode) {
          if (matchmakerUi) matchmakerUi.classList.add('hidden');
          if (privacyLock) privacyLock.classList.remove('hidden');
      } else {
          if (matchmakerUi) matchmakerUi.classList.remove('hidden');
          if (privacyLock) privacyLock.classList.add('hidden');
      }

      if (isAdminMode) {
          document.getElementById('bottom-nav-admin').classList.remove('hidden');
          document.getElementById('admin-tools-container').classList.remove('hidden');
          checkDatabaseStatus();
      } else {
          document.getElementById('bottom-nav-user').classList.remove('hidden');
          const quotaDisplay = document.getElementById('quota-display');
          if (quotaDisplay) quotaDisplay.classList.remove('hidden');
          const quotaRemainingEl = document.getElementById('quota-remaining');
          if (quotaRemainingEl && userRes.remainingFate !== undefined) {
              quotaRemainingEl.innerText = userRes.remainingFate;
          }
      }
      
    } catch (err) {
      alert("初始化發生異常：" + err.message);
    }
  };

  // ⭐ QQ 新增：在配對大廳中直接控制隱私開關並同步至資料庫
  window.toggleFatePrivacy = async function(forcePublic = null) {
      if (!currentUserCard) {
          showToast("找不到您的名片資料，請先前往「設定」建立名片！", true);
          const toggle = document.getElementById('fate-privacy-toggle');
          if (toggle) toggle.checked = false;
          return;
      }

      if (isProcessing) return;
      isProcessing = true;

      const toggle = document.getElementById('fate-privacy-toggle');
      let isPublic = forcePublic !== null ? forcePublic : (toggle ? toggle.checked : true);

      if (toggle) toggle.checked = isPublic;

      let config = {};
      if (currentUserCard['自訂名片設定']) {
          try { config = JSON.parse(currentUserCard['自訂名片設定']); } catch(e){}
      }

      config.isPrivate = !isPublic;

      try {
          if (forcePublic) {
              showToast("🔐 名片公開解鎖中...");
          }

          // 向後端更新設定 (這會自動清除 Worker 裡的 KV_CONTACTS 快取)
          await fetchAPI('updateECardConfig', {
              rowId: currentUserCard.rowId,
              targetVerifyUid: currentUserCard['LINE ID'] || currentUserCard.userId || '',
              targetVerifyName: currentUserCard['姓名'] || currentUserCard['Name'] || '',
              config: config
          });

          // 更新本地快取
          currentUserCard['自訂名片設定'] = JSON.stringify(config);

          const matchmakerUi = document.getElementById('matchmaker-ui');
          const privacyLock = document.getElementById('privacy-lock-container');

          // 更新 UI
          if (!isPublic && !isAdminMode) {
              if (matchmakerUi) matchmakerUi.classList.add('hidden');
              if (privacyLock) privacyLock.classList.remove('hidden');
          } else {
              if (matchmakerUi) matchmakerUi.classList.remove('hidden');
              if (privacyLock) privacyLock.classList.add('hidden');
          }

          showToast(isPublic ? "✅ 已公開名片，啟用 AI 配對" : "🔒 已隱藏名片，暫停配對功能");

      } catch (err) {
          showToast("更新失敗：" + err.message, true);
          if (toggle) toggle.checked = !isPublic; // 失敗時退回原狀態
      } finally {
          isProcessing = false;
      }
  }

  async function fetchAPI(action, payload = {}, silent = false) {
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 45000);

        const response = await fetch(WORKER_URL, {
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, payload }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        const resText = await response.text();
        let result;
        try { 
            result = JSON.parse(resText); 
        } catch(e) { 
            throw new Error(`伺服器回傳非預期格式:\n\n${resText.substring(0, 150)}`); 
        }

        if (!result.success) throw new Error(result.error);
        return result.data;
    } catch (err) {
        if (err.name === 'AbortError') err.message = '連線已經超時 (45秒)，OpenAI 伺服器目前可能過載，請稍後再試。';
        throw err;
    }
  }

  function checkDatabaseStatus() {
      if (!Array.isArray(globalCardContacts)) return;
      const missingContacts = globalCardContacts.filter(c => !c['個性'] || String(c['個性']).trim() === '' || String(c['個性']) === '待分析' || String(c['個性']) === 'undefined');
      const missingCount = missingContacts.length;
      
      const totalEl = document.getElementById('total-count');
      const missingEl = document.getElementById('missing-count');
      const btnSync = document.getElementById('btn-sync-tags');
      
      if(totalEl) totalEl.innerText = globalCardContacts.length;
      if(missingEl) missingEl.innerText = missingCount;
      
      if (missingCount > 0) {
          if(btnSync) btnSync.classList.remove('hidden');
      } else {
          if(btnSync) btnSync.classList.add('hidden');
      }
  }

  async function syncOldTags(forceAll = false) {
      const targetContacts = forceAll 
          ? globalCardContacts 
          : globalCardContacts.filter(c => !c['個性'] || String(c['個性']).trim() === '' || String(c['個性']) === '待分析' || String(c['個性']) === 'undefined');
          
      if (targetContacts.length === 0) {
          if(!forceAll) return;
      }

      const msg = forceAll

                  Ext: c['分機'] || '',

                  SocialMedia: c['社群帳號'] || '',

                  Birthday: bdayToUse,

                  Wealth: newTags.Wealth || '待分析',
                  Health: newTags.Health || '待分析',
                  Career: newTags.Career || '待分析'

              await fetchAPI('updateCard', fullPayload, true);
              successCount++;
              
              c['個性'] = fullPayload.Personality;
              c['興趣'] = fullPayload.Hobbies;
              c['財運'] = fullPayload.Wealth;
              c['健康'] = fullPayload.Health;
              c['事業'] = fullPayload.Career;

  function getDirectImageUrl(url) { 
      if (!url) return url;
      const driveMatch = url.match(/id=([a-zA-Z0-9_-]+)/) || url.match(/d\/([a-zA-Z0-9_-]+)/);
      if (driveMatch && url.includes('drive.google.com')) {
          return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w1000`;
      }
      return url;
  }

  function getTrueAspectRatio(url) {
      return new Promise((resolve) => {
          if (!url) return resolve('20:13');
          const img = new Image();
          img.onload = function() {
              let w = this.width; let h = this.height; let ratio = w / h;
              if (ratio > 3) { w = 300; h = 100; }
              else if (ratio < 0.334) { w = 100; h = 300; }
              resolve(`${Math.round(w)}:${Math.round(h)}`);
          };
          img.onerror = function() { resolve('20:13'); };
          img.src = url;
      });
  }

       }
  }

</script>
