<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>名片管理</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style type="text/tailwindcss">
    body { background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .input-label { @apply block text-[13px] font-bold text-gray-500 mb-2 uppercase tracking-wider; }
    .custom-input { @apply w-full h-[46px] px-4 bg-white border border-gray-400 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-medium text-gray-800 text-[15px] shadow-sm placeholder-gray-300; }
    .textarea-block { @apply w-full p-4 bg-white border border-gray-400 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-[15px] text-gray-800 resize-none leading-relaxed shadow-sm placeholder-gray-300; }
    
    .btn-primary { @apply w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-[16px] shadow-md shadow-blue-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 hover:bg-blue-700; }
    .btn-secondary { @apply w-full py-4 bg-white border border-gray-200 text-gray-700 rounded-xl font-bold text-[16px] hover:bg-gray-50 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm; }

    /* 🚀 統一深藍底導覽列 */
    .unified-nav { 
        position: fixed; bottom: 0; width: 100%; max-width: 448px;
        background-color: #1e3a8a !important; display: flex; justify-content: space-around; 
        align-items: center; padding: 8px 4px; z-index: 50; height: 76px;
        border-top: 1px solid #172554; border-radius: 20px 20px 0 0;
        box-shadow: 0 -10px 20px rgba(0,0,0,0.15); left: 50%; transform: translateX(-50%);
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: rgba(191, 219, 254, 0.6); font-weight: bold; transition: all 0.2s; }
    .nav-btn .icon-box { padding: 6px 16px; border-radius: 16px; transition: all 0.2s; margin-bottom: 2px; }
    .nav-btn.nav-active { color: #ffffff !important; }
    .nav-btn.nav-active .icon-box { background-color: rgba(255, 255, 255, 0.2); }
    .nav-text { font-size: 10px; }

    .bottom-sheet-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body class="font-sans text-text-main min-h-screen flex flex-col items-center bg-gray-50">

<div class="w-full max-w-md bg-background h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-gray-200 shadow-sm">
    <div class="text-[19px] font-extrabold text-gray-800 flex items-center gap-2 font-headline tracking-tight">
      <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center shadow-sm"><i data-lucide="contact" class="w-5 h-5"></i></div>
      名片管理 <span class="text-[10px] text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded ml-1 font-bold">V2.0</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="user-profile-badge" class="hidden flex items-center gap-2">
        <img id="user-avatar" src="" class="w-9 h-9 rounded-full object-cover border border-gray-200 shadow-sm">
      </div>
      <button id="role-switch-btn" onclick="window.location.reload()" class="w-9 h-9 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center active:scale-95 transition-all"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
    </div>
  </nav>

  <main id="main-content" class="flex-1 overflow-y-auto pb-32 pt-20 bg-gray-50">
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4 pb-20">
      <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p id="loading-text" class="text-gray-500 font-bold text-[14px]">資料載入中</p>
    </div>

    <!-- 主畫面：工具區與列表 -->
    <div id="view-list" class="hidden animate-in fade-in">
      <div id="admin-tools-container" class="px-5 pt-4">
        <div class="bg-white rounded-2xl shadow-sm p-6 text-center border border-gray-100">
          <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3"><i data-lucide="scan-line" class="w-6 h-6"></i></div>
          <h2 class="text-[16px] font-bold text-gray-800 mb-1">AI 智慧名片辨識</h2>
          <p class="text-[13px] text-gray-500 mb-5 font-medium">拍照或上傳，自動擷取資訊並產生標語。</p>
          <div class="flex gap-3">
            <button onclick="document.getElementById('card-camera').click()" class="btn-primary flex-[1.2]"><i data-lucide="camera" class="w-5 h-5"></i> 開啟相機</button>
            <button onclick="document.getElementById('card-upload').click()" class="btn-secondary flex-1"><i data-lucide="image" class="w-5 h-5"></i> 從相簿</button>
          </div>
          <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="openCropper(this, 'card')">
          <input type="file" id="card-upload" accept="image/*" class="hidden" onchange="openCropper(this, 'card')">
        </div>
      </div>

      <div class="mt-6">
        <div class="px-5 mb-3 flex gap-2 relative">
          <div class="relative flex-1 flex flex-col">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-[18px] h-[18px]"></i>
            <input type="text" id="card-search-input" onkeyup="filterCardList()" class="w-full h-[50px] pl-11 pr-4 bg-white border border-transparent rounded-xl text-[15px] outline-none focus:ring-4 focus:ring-blue-500/10 transition-all shadow-sm font-medium" placeholder="搜尋姓名或公司...">
          </div>
          <button onclick="reloadCardContacts()" class="w-[50px] h-[50px] bg-white border border-transparent rounded-xl shadow-sm flex items-center justify-center text-gray-600 active:scale-95 transition-all shrink-0"><i data-lucide="refresh-ccw" class="w-5 h-5"></i></button>
        </div>
        <div id="admin-card-list-container" class="flex flex-col mt-2"></div>
      </div>
    </div>

    <!-- AI 處理與確認表單 (還原完整表單) -->
    <div id="view-process" class="hidden space-y-6 animate-in fade-in pt-4 px-5">
      <div class="flex items-center gap-3 mb-2">
        <button onclick="resetUI()" class="w-9 h-9 bg-white rounded-full flex items-center justify-center text-gray-600 shadow-sm active:scale-90"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
        <h2 class="text-[20px] font-bold text-gray-800">辨識結果確認</h2>
      </div>

      <div id="section-loading" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center mt-6">
        <i data-lucide="loader-2" class="w-10 h-10 text-blue-600 animate-spin mb-3 mx-auto"></i>
        <h3 class="text-[16px] font-bold text-gray-800">AI 多工辨識中...</h3>
        <p class="text-[13px] text-gray-500">正在萃取名片並計算命理標籤。</p>
      </div>

      <div id="section-form" class="hidden space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <div class="mb-5 rounded-xl overflow-hidden bg-gray-50 flex items-center justify-center min-h-[150px] shadow-inner">
            <img id="process-preview-image" src="" class="w-full h-auto object-contain max-h-[200px]">
          </div>
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div><label class="input-label">姓名</label><input type="text" id="f-Name" class="custom-input"></div>
                <div><label class="input-label">英文名</label><input type="text" id="f-EnglishName" class="custom-input"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="input-label">職稱</label><input type="text" id="f-Title" class="custom-input"></div>
                <div><label class="input-label">部門</label><input type="text" id="f-Department" class="custom-input"></div>
            </div>
            <div><label class="input-label">公司名稱</label><input type="text" id="f-CompanyName" class="custom-input"></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="input-label">手機</label><input type="tel" id="f-Mobile" class="custom-input"></div>
                <div><label class="input-label">信箱</label><input type="email" id="f-Email" class="custom-input"></div>
            </div>
            <div><label class="input-label">地址</label><input type="text" id="f-Address" class="custom-input"></div>
            <div><label class="input-label">品牌標語 (AI 擴寫)</label><textarea id="f-Slogan" class="textarea-block h-32"></textarea></div>
            <div class="pt-4 border-t border-gray-100"><label class="input-label text-blue-600">備註</label><textarea id="f-Notes" class="textarea-block h-24" placeholder="例如：展覽認識"></textarea></div>
          </div>
          <div class="flex gap-3 mt-8">
            <button onclick="resetUI()" class="w-1/3 py-4 bg-gray-100 text-gray-600 rounded-xl font-bold">取消</button>
            <button onclick="saveToCloud()" class="flex-1 btn-primary">存入雲端 <i data-lucide="upload-cloud" class="w-5 h-5"></i></button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav-admin" class="hidden unified-nav pb-safe">
      <button onclick="window.location.href='index.html'" class="nav-btn"><div class="icon-box"><i data-lucide="calendar-check" class="w-6 h-6"></i></div><span class="nav-text">主頁</span></button>
      <button onclick="window.location.href='admin-sales.html'" class="nav-btn"><div class="icon-box"><i data-lucide="store" class="w-6 h-6"></i></div><span class="nav-text">店家</span></button>
      <button onclick="window.location.href='index.html'" class="nav-btn"><div class="icon-box"><i data-lucide="users" class="w-6 h-6"></i></div><span class="nav-text">CRM</span></button>
      <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><i data-lucide="sparkles" class="w-6 h-6"></i></div><span class="nav-text">配對</span></button>
      <button onclick="window.location.href='card.html'" class="nav-btn nav-active"><div class="icon-box"><i data-lucide="contact" class="w-6 h-6"></i></div><span class="nav-text">名片</span></button>
      <button onclick="window.location.href='profile.html'" class="nav-btn"><div class="icon-box"><i data-lucide="settings" class="w-6 h-6"></i></div><span class="nav-text">參數</span></button>
  </nav>
</div>

<!-- ========================================== -->
<!-- 🚀 功能組件：還原所有消失的 Modal -->
<!-- ========================================== -->

<!-- 1. 名片詳情 Read-only Modal -->
<div id="readonly-card-modal" class="hidden fixed inset-0 bg-white flex flex-col animate-in slide-in-from-bottom-full duration-300 w-full max-w-md mx-auto left-0 right-0 z-[1000] overflow-hidden shadow-2xl">
  <div class="absolute top-4 right-4 z-50 flex gap-3">
    <button onclick="openCardEdit()" class="w-10 h-10 bg-white/90 backdrop-blur-md rounded-full flex items-center justify-center text-blue-600 shadow-sm"><i data-lucide="pen" class="w-5 h-5"></i></button>
    <button onclick="closeReadOnlyCard()" class="w-10 h-10 bg-black/50 backdrop-blur-md rounded-full flex items-center justify-center text-white shadow-sm"><i data-lucide="x" class="w-5 h-5"></i></button>
  </div>
  <div class="flex-1 overflow-y-auto pb-28">
    <div class="w-full aspect-[20/13] bg-gray-100 relative flex items-center justify-center shrink-0">
      <img id="ro-image" src="" class="w-full h-full object-cover hidden">
      <div id="ro-no-image" class="absolute inset-0 flex items-center justify-center text-gray-300"><i data-lucide="contact" class="w-16 h-16"></i></div>
    </div>
    <div class="px-5 pt-6">
      <h2 id="ro-name" class="text-[26px] font-extrabold text-gray-800 tracking-tight"></h2>
      <p id="ro-title" class="text-[15px] font-medium text-gray-500 mb-6"></p>
      <div class="space-y-4 border-t border-gray-100 pt-6">
        <div class="flex items-center gap-4"><i data-lucide="building" class="text-gray-400 w-5 h-5"></i><span id="ro-company" class="text-gray-800 font-medium"></span></div>
        <div class="flex items-center gap-4"><i data-lucide="smartphone" class="text-gray-400 w-5 h-5"></i><a id="ro-mobile-link" class="text-blue-600 font-bold"></a></div>
        <div class="flex items-center gap-4"><i data-lucide="mail" class="text-gray-400 w-5 h-5"></i><a id="ro-email-link" class="text-blue-600 font-bold truncate"></a></div>
        <div class="flex items-start gap-4"><i data-lucide="map-pin" class="text-gray-400 w-5 h-5 mt-0.5"></i><span id="ro-address" class="text-gray-800 font-medium leading-snug"></span></div>
      </div>
      <div class="mt-8 bg-gray-50 p-4 rounded-xl border border-gray-100"><p id="ro-notes" class="text-sm text-gray-600 whitespace-pre-wrap"></p></div>
    </div>
  </div>
  <div class="fixed bottom-0 w-full max-w-md bg-white p-4 pb-safe flex gap-3 border-t border-gray-100 shadow-lg">
    <button onclick="openECardGenerator()" class="w-full py-4 bg-[#06C755] text-white rounded-2xl font-bold text-lg active:scale-95 transition-all">產生數位名片</button>
  </div>
</div>

<!-- 2. 裁切器 Modal -->
<div id="section-image-cropper" class="hidden fixed inset-0 bg-black z-[1100] flex flex-col">
    <div class="flex justify-between p-4 bg-black text-white"><button onclick="cancelCrop()" class="px-4 py-2 font-bold text-gray-400">取消</button><span class="font-bold">裁切圖片</span><button onclick="confirmCrop()" class="px-4 py-2 font-bold text-blue-500">完成</button></div>
    <div class="flex-1 overflow-hidden flex items-center justify-center"><img id="cropper-image" class="max-w-full max-h-full"></div>
</div>

<!-- 3. Toast 通知 -->
<div id="toast" class="hidden fixed top-16 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full text-sm font-bold shadow-lg z-[10000]"></div>

<script src="card.js?v=20260416_2320"></script>
<script src="card-ecard.js?v=20260416_2320"></script>
<script>lucide.createIcons();</script>
</body>
</html>
