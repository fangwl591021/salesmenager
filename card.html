<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>名片管理</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #ffffff; font-family: 'Noto Sans TC', sans-serif; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .custom-input { @apply w-full h-[50px] px-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:bg-white focus:border-blue-500 transition-all font-medium text-gray-800; }
    
    /* 🚀 統一深藍底導覽列 (與首頁同步) */
    .unified-nav { 
        position: fixed; bottom: 0; width: 100%; max-width: 448px;
        background-color: #1e3a8a !important; display: flex; justify-content: space-around; 
        align-items: center; padding: 8px 4px; z-index: 50; height: 76px;
        border-top: 1px solid #172554; border-radius: 20px 20px 0 0;
        box-shadow: 0 -10px 20px rgba(0,0,0,0.15); left: 50%; transform: translateX(-50%);
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: rgba(191, 219, 254, 0.6); font-weight: bold; transition: all 0.2s; }
    .nav-btn .icon-box { padding: 6px 16px; border-radius: 16px; transition: all 0.2s; margin-bottom: 2px; }
    .nav-btn.nav-active { color: #ffffff !important; }
    .nav-btn.nav-active .icon-box { background-color: rgba(255, 255, 255, 0.2); }
    .nav-text { font-size: 10px; }
  </style>
</head>
<body class="bg-gray-50 flex flex-col items-center">

<div class="w-full max-w-md bg-white h-screen relative flex flex-col shadow-2xl overflow-hidden">
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur-xl px-5 py-3.5 flex justify-between items-center left-1/2 -translate-x-1/2 border-b border-gray-200">
    <div class="text-[19px] font-extrabold text-gray-800 flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center"><i data-lucide="contact" class="w-5 h-5"></i></div>
      名片管理
    </div>
  </nav>

  <main class="flex-1 overflow-y-auto pb-32 pt-20">
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4">
      <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p id="loading-text" class="text-gray-500 font-bold text-sm">資料載入中</p>
    </div>

    <!-- 列表、辨識、表單區塊依此類推... -->
    <div id="view-list" class="hidden px-5">
       <div class="bg-white rounded-2xl shadow-sm p-6 text-center border border-gray-100 my-4">
          <button onclick="document.getElementById('card-camera').click()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold mb-3 flex items-center justify-center gap-2">
            <i data-lucide="camera"></i> 開啟相機
          </button>
          <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="openCropper(this, 'card')">
       </div>
       <div id="admin-card-list-container" class="space-y-1"></div>
    </div>
    
    <!-- 辨識確認表單 (對應之前的設計) -->
    <div id="view-process" class="hidden px-5 space-y-6">
        <div id="section-loading" class="hidden text-center py-10"><i data-lucide="loader-2" class="w-10 h-10 animate-spin mx-auto text-blue-500"></i><p>AI 辨識中...</p></div>
        <div id="section-form" class="hidden space-y-4">
            <img id="process-preview-image" class="w-full rounded-xl shadow-sm">
            <input type="text" id="f-Name" class="custom-input" placeholder="姓名">
            <input type="text" id="f-CompanyName" class="custom-input" placeholder="公司">
            <button onclick="resetUI()" class="w-full py-4 bg-gray-200 rounded-xl font-bold">返回</button>
        </div>
    </div>
  </main>

  <nav id="bottom-nav-admin" class="hidden unified-nav pb-safe">
      <button onclick="window.location.href='index.html'" class="nav-btn"><div class="icon-box"><i data-lucide="calendar-check" class="w-6 h-6"></i></div><span class="nav-text">主頁</span></button>
      <button onclick="window.location.href='admin-sales.html'" class="nav-btn"><div class="icon-box"><i data-lucide="store" class="w-6 h-6"></i></div><span class="nav-text">店家</span></button>
      <button onclick="window.location.href='index.html'" class="nav-btn"><div class="icon-box"><i data-lucide="users" class="nav-text"></i></div><span class="nav-text">CRM</span></button>
      <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><i data-lucide="sparkles" class="w-6 h-6"></i></div><span class="nav-text">配對</span></button>
      <button onclick="window.location.href='card.html'" class="nav-btn nav-active"><div class="icon-box"><i data-lucide="contact" class="w-6 h-6"></i></div><span class="nav-text">名片</span></button>
      <button onclick="window.location.href='profile.html'" class="nav-btn"><div class="icon-box"><i data-lucide="settings" class="w-6 h-6"></i></div><span class="nav-text">參數</span></button>
  </nav>
</div>

<div id="section-image-cropper" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
    <div class="flex justify-between p-4 bg-black text-white"><button onclick="cropper.destroy(); document.getElementById('section-image-cropper').classList.add('hidden');">取消</button><button onclick="confirmCrop()">完成</button></div>
    <div class="flex-1 overflow-hidden flex items-center justify-center"><img id="cropper-image" class="max-w-full max-h-full"></div>
</div>

<div id="toast" class="hidden fixed top-16 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full text-sm font-bold shadow-lg z-[10000]"></div>

<script src="card.js?v=20260416_2310"></script>
<script>lucide.createIcons();</script>
</body>
</html>
