<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>名片管理</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #ffffff; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .form-input { @apply w-full h-[48px] px-4 bg-white border border-gray-400 rounded-lg outline-none focus:border-blue-500 transition-all font-medium text-gray-800 text-[15px]; }
    .textarea-block { @apply w-full p-4 bg-white border border-gray-400 rounded-lg outline-none focus:border-blue-500 transition-all text-[15px] text-gray-800 resize-none; }

    /* 統一深藍底導覽列 */
    .unified-nav { 
        position: fixed; bottom: 0; width: 100%; max-width: 448px;
        background-color: #1e3a8a !important; display: flex; justify-content: space-around; 
        align-items: center; padding: 8px 4px; z-index: 50; height: 76px;
        border-top: 1px solid #172554; border-radius: 20px 20px 0 0;
        box-shadow: 0 -10px 20px rgba(0,0,0,0.15); left: 50%; transform: translateX(-50%);
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: rgba(191, 219, 254, 0.6); font-weight: bold; transition: all 0.2s; }
    .nav-btn .icon-box { padding: 6px 16px; border-radius: 16px; transition: all 0.2s; margin-bottom: 2px; }
    .nav-btn.nav-active { color: #ffffff !important; }
    .nav-btn.nav-active .icon-box { background-color: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body class="flex flex-col items-center">

<div class="w-full max-w-md bg-white h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur-xl px-5 py-4 flex justify-between items-center border-b border-gray-100 shadow-sm">
    <div class="text-[19px] font-black text-gray-800 flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center shadow-sm"><i data-lucide="contact" class="w-5 h-5"></i></div>
      名片管理
    </div>
  </nav>

  <main class="flex-1 overflow-y-auto pb-32 pt-20 bg-gray-50">
    <!-- 載入中 -->
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4">
      <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-gray-400 font-bold text-sm">讀取通訊錄...</p>
    </div>

    <!-- 列表主畫面 -->
    <div id="view-list" class="hidden px-5">
      <div class="bg-white rounded-2xl p-6 text-center border border-gray-100 my-6 shadow-sm">
        <button onclick="document.getElementById('card-camera').click()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
          <i data-lucide="camera"></i> 拍名片辨識
        </button>
        <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="openCropper(this)">
      </div>
      <div id="card-list-container" class="space-y-0.5"></div>
    </div>

    <!-- 辨識確認與寫入 -->
    <div id="view-process" class="hidden px-5 space-y-6 pt-4">
        <div id="section-loading" class="hidden text-center py-20"><i data-lucide="loader-2" class="w-10 h-10 animate-spin text-blue-600 mx-auto mb-4"></i><p class="font-bold text-gray-500">AI 辨識與分析中...</p></div>
        <div id="section-form" class="hidden space-y-4">
            <img id="process-preview" class="w-full rounded-xl object-contain max-h-[180px] bg-white border">
            <div><label class="text-xs font-bold text-gray-400">姓名</label><input type="text" id="f-Name" class="form-input"></div>
            <div><label class="text-xs font-bold text-gray-400">公司</label><input type="text" id="f-CompanyName" class="form-input"></div>
            <div><label class="text-xs font-bold text-gray-400">標語 (AI 擴寫)</label><textarea id="f-Slogan" class="textarea-block h-24"></textarea></div>
            <div class="flex gap-3 pb-10 mt-6">
                <button onclick="resetUI()" class="w-1/3 py-4 bg-gray-100 text-gray-500 rounded-xl font-bold">返回</button>
                <button onclick="saveToCloud()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black shadow-lg">存入雲端</button>
            </div>
        </div>
    </div>
  </main>

  <nav id="bottom-nav-admin" class="unified-nav pb-safe">
      <button onclick="window.location.href='index.html'" class="nav-btn"><div class="icon-box"><i data-lucide="calendar-check" class="w-6 h-6"></i></div><span class="text-[10px]">主頁</span></button>
      <button onclick="window.location.href='admin-sales.html'" class="nav-btn"><div class="icon-box"><i data-lucide="store" class="w-6 h-6"></i></div><span class="text-[10px]">店家</span></button>
      <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><i data-lucide="sparkles" class="w-6 h-6"></i></div><span class="text-[10px]">配對</span></button>
      <button onclick="window.location.href='card.html'" class="nav-btn nav-active"><div class="icon-box"><i data-lucide="contact" class="w-6 h-6"></i></div><span class="text-[10px]">名片</span></button>
      <button onclick="window.location.href='profile.html'" class="nav-btn"><div class="icon-box"><i data-lucide="settings" class="w-6 h-6"></i></div><span class="text-[10px]">參數</span></button>
  </nav>
</div>

<!-- 名片詳情 Modal -->
<div id="readonly-modal" class="hidden fixed inset-0 bg-white z-[1000] flex flex-col">
    <div class="p-4 flex justify-between items-center border-b border-gray-100 shadow-sm">
        <h3 class="font-black text-gray-800">名片資料</h3>
        <button onclick="document.getElementById('readonly-modal').classList.add('hidden')" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="flex-1 overflow-y-auto">
        <img id="ro-img" class="w-full aspect-[20/13] object-cover bg-gray-100">
        <div class="px-6 py-6">
            <h2 id="ro-name" class="text-3xl font-black text-gray-800 mb-1"></h2>
            <p id="ro-company" class="text-gray-500 font-bold mb-8"></p>
            <div class="space-y-4 border-t border-gray-100 pt-8">
                <div class="flex items-center gap-4"><i data-lucide="smartphone" class="text-blue-600"></i><a id="ro-mobile" class="text-blue-600 font-black text-lg"></a></div>
            </div>
        </div>
    </div>
</div>

<!-- 裁切器 -->
<div id="section-cropper" class="hidden fixed inset-0 bg-black z-[2000] flex flex-col">
    <div class="p-4 flex justify-between text-white border-b border-gray-800"><button onclick="cancelCrop()">取消</button><button onclick="confirmCrop()" class="text-blue-500 font-black">完成</button></div>
    <div class="flex-1 flex items-center justify-center overflow-hidden"><img id="cropper-img" class="max-w-full max-h-full"></div>
</div>

<div id="toast" class="hidden fixed top-16 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full text-sm font-bold shadow-lg z-[10000]"></div>

<script>
const WORKER_URL = "https://salesmemager.fangwl591021.workers.dev/"; 
let cropper = null, globalContacts = [], currentBase64 = "";

window.fetchAPI = async (action, payload = {}) => {
  const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action, payload }) });
  const data = await res.json();
  if (!data.success) throw new Error(data.error);
  return data.data;
};

window.initApp = async function() {
    try {
        await liff.init({ liffId: "2008924519-RslRiLoO" });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        const res = await fetchAPI('initApp', { userId: profile.userId });
        globalContacts = res.contacts || [];
        renderCardList(globalContacts);
        document.getElementById('view-loading').classList.add('hidden');
        document.getElementById('view-list').classList.remove('hidden');
        lucide.createIcons();
    } catch (e) { console.error(e); }
};

window.openCropper = (input) => {
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById('cropper-img').src = e.target.result;
        document.getElementById('section-cropper').classList.remove('hidden');
        if (cropper) cropper.destroy();
        cropper = new Cropper(document.getElementById('cropper-img'), { viewMode: 1 });
    };
    reader.readAsDataURL(input.files[0]);
};

window.confirmCrop = async () => {
    const base64 = cropper.getCroppedCanvas({ maxWidth: 1024 }).toDataURL('image/jpeg', 0.8);
    currentBase64 = base64;
    document.getElementById('section-cropper').classList.add('hidden');
    document.getElementById('view-list').classList.add('hidden');
    document.getElementById('view-process').classList.remove('hidden');
    document.getElementById('section-loading').classList.remove('hidden');
    document.getElementById('section-form').classList.add('hidden');

    try {
        const res = await fetchAPI('recognizeCard', { base64Image: base64 });
        document.getElementById('f-Name').value = res.Name;
        document.getElementById('f-CompanyName').value = res.CompanyName;
        document.getElementById('f-Slogan').value = res.Slogan;
        document.getElementById('f-Name').dataset.personality = res.Personality;
        document.getElementById('process-preview').src = base64;
        document.getElementById('section-loading').classList.add('hidden');
        document.getElementById('section-form').classList.remove('hidden');
    } catch (e) { showToast("AI 辨識異常", true); resetUI(); }
};

window.saveToCloud = async () => {
    const btn = document.querySelector('#section-form button.bg-blue-600');
    btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i>'; lucide.createIcons({root:btn});
    try {
        const upload = await fetchAPI('uploadImage', { base64Image: currentBase64 });
        const p = {
            userId: liff.getContext().userId,
            Name: document.getElementById('f-Name').value,
            CompanyName: document.getElementById('f-CompanyName').value,
            Slogan: document.getElementById('f-Slogan').value,
            Personality: document.getElementById('f-Name').dataset.personality,
            imgUrl: upload.url
        };
        await fetchAPI('saveCard', p);
        showToast("✅ 已同步至試算表庫");
        setTimeout(() => location.reload(), 1500);
    } catch (e) { showToast("存檔失敗", true); }
};

function renderCardList(list) {
    const container = document.getElementById('card-list-container');
    container.innerHTML = list.map(c => `
      <div onclick="openCard('${c.rowId}')" class="bg-white p-4 border-b border-gray-100 flex items-center gap-4 active:bg-gray-50 transition-all">
        <img src="${c.imgUrl}" class="w-12 h-12 rounded-lg object-cover border border-gray-100" onerror="this.src='https://ui-avatars.com/api/?name=${c.Name}'">
        <div class="flex-1"><h3 class="font-bold text-gray-800">${c.Name || '未知'}</h3><p class="text-xs text-gray-400">${c.CompanyName || ''}</p></div>
        <i data-lucide="chevron-right" class="text-gray-300 w-4 h-4"></i>
      </div>
    `).join('');
    lucide.createIcons({root:container});
}

window.openCard = (rowId) => {
    const c = globalContacts.find(i => String(i.rowId) === String(rowId));
    if (!c) return;
    document.getElementById('ro-name').innerText = c.Name;
    document.getElementById('ro-company').innerText = c.CompanyName;
    document.getElementById('ro-mobile').innerText = c.Mobile;
    document.getElementById('ro-mobile').href = `tel:${c.Mobile}`;
    document.getElementById('ro-img').src = c.imgUrl;
    document.getElementById('readonly-modal').classList.remove('hidden');
    lucide.createIcons();
};

window.showToast = (msg, isError = false) => {
    const t = document.getElementById('toast');
    t.innerHTML = `<i data-lucide="${isError?'alert-circle':'check-circle-2'}" class="w-4 h-4"></i> ${msg}`;
    t.className = `fixed top-16 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-full text-sm font-bold shadow-lg z-[10000] ${isError?'bg-red-500':'bg-gray-800'} text-white opacity-100`;
    t.classList.remove('hidden'); lucide.createIcons({ root: t });
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.classList.add('hidden'), 300); }, 3000); 
};

window.resetUI = () => { document.getElementById('view-process').classList.add('hidden'); document.getElementById('view-list').classList.remove('hidden'); };
window.cancelCrop = () => document.getElementById('section-cropper').classList.add('hidden');
window.onload = window.initApp;
</script>
</body>
</html>
