<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>名片管理</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style type="text/tailwindcss">
    body { background-color: #ffffff; @apply text-slate-900; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .form-label { @apply block text-[13px] font-bold text-slate-500 mb-1.5; }
    .form-input { @apply w-full h-[48px] px-4 bg-white border border-slate-300 rounded-lg outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition-all font-medium; }
    .textarea-block { @apply w-full p-4 bg-white border border-slate-300 rounded-lg outline-none focus:border-blue-600 transition-all resize-none; }
    
    /* 🚀 統一導覽列：藍底白字 */
    .unified-nav { position: fixed; bottom: 0; width: 100%; max-width: 448px; background-color: #1e3a8a !important; display: flex; justify-content: space-around; align-items: center; z-index: 50; height: 76px; border-radius: 20px 20px 0 0; left: 50%; transform: translateX(-50%); }
    .nav-btn { @apply flex flex-col items-center justify-center flex-1 text-blue-100/60 font-bold; }
    .nav-btn.nav-active { @apply text-white; }
    .nav-btn.nav-active .icon-box { @apply bg-white/20 px-4 py-1 rounded-xl; }
  </style>
</head>
<body class="flex flex-col items-center bg-slate-50">
<div class="w-full max-w-md bg-white h-screen relative flex flex-col shadow-2xl overflow-hidden">
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur px-5 py-4 flex justify-between items-center border-b border-slate-100">
    <div class="text-xl font-black text-slate-800 flex items-center gap-2">名片管理</div>
    <div id="user-profile-badge" class="hidden"><img id="user-avatar" class="w-9 h-9 rounded-full border"></div>
  </nav>

  <main class="flex-1 overflow-y-auto pb-32 pt-20">
    <div id="view-loading" class="h-full flex flex-col items-center justify-center space-y-4"><div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>
    
    <div id="view-list" class="hidden px-5">
      <button onclick="document.getElementById('card-camera').click()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg mb-6 flex items-center justify-center gap-2"><i data-lucide="camera"></i> 拍名片辨識</button>
      <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden" onchange="openCropper(this)">
      <div id="card-list-container" class="space-y-1"></div>
    </div>

    <div id="view-process" class="hidden px-5 space-y-6 pt-4">
      <div id="section-loading" class="hidden text-center py-20"><i data-lucide="loader-2" class="w-10 h-10 animate-spin text-blue-600 mx-auto"></i><p class="font-bold text-slate-500 mt-4">AI 多工處理中...</p></div>
      <div id="section-form" class="hidden space-y-4">
        <div class="bg-slate-50 p-2 rounded-2xl"><img id="process-preview" class="w-full rounded-xl border"></div>
        <div><label class="form-label">姓名</label><input type="text" id="f-Name" class="form-input"></div>
        <div><label class="form-label">公司名稱</label><input type="text" id="f-CompanyName" class="form-input"></div>
        <div><label class="form-label">品牌標語 (AI 擴寫)</label><textarea id="f-Slogan" class="textarea-block h-28"></textarea></div>
        <div class="flex gap-3 pt-4"><button onclick="resetUI()" class="w-1/3 py-4 bg-slate-100 text-slate-500 rounded-xl font-bold">返回</button><button onclick="saveToCloud()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black shadow-lg">存入雲端</button></div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav-admin" class="unified-nav pb-safe">
    <button onclick="window.location.href='index.html'" class="nav-btn"><div class="icon-box"><i data-lucide="calendar-check" class="w-6 h-6"></i></div><span class="text-[10px]">主頁</span></button>
    <button onclick="window.location.href='admin-sales.html'" class="nav-btn"><div class="icon-box"><i data-lucide="store" class="w-6 h-6"></i></div><span class="text-[10px]">店家</span></button>
    <button onclick="window.location.href='fate.html'" class="nav-btn"><div class="icon-box"><i data-lucide="sparkles" class="w-6 h-6"></i></div><span class="text-[10px]">配對</span></button>
    <button onclick="window.location.href='card.html'" class="nav-btn nav-active"><div class="icon-box"><i data-lucide="contact" class="w-6 h-6"></i></div><span class="text-[10px]">名片</span></button>
    <button onclick="window.location.href='profile.html'" class="nav-btn"><div class="icon-box"><i data-lucide="settings" class="w-6 h-6"></i></div><span class="text-[10px]">參數</span></button>
  </nav>
</div>

<!-- 還原 Modal 結構 (詳情、裁切) -->
<div id="readonly-modal" class="hidden fixed inset-0 bg-white z-[1000] flex flex-col animate-in slide-in-from-bottom-full duration-300">
  <div class="p-4 flex justify-between items-center border-b shadow-sm"><h3 class="font-black">名片詳情</h3><button onclick="document.getElementById('readonly-modal').classList.add('hidden')" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center"><i data-lucide="x" class="w-4 h-4"></i></button></div>
  <div class="flex-1 overflow-y-auto"><img id="ro-img" class="w-full aspect-[20/13] object-cover bg-slate-100"><div class="px-6 py-6"><h2 id="ro-name" class="text-3xl font-black mb-1"></h2><p id="ro-company" class="text-slate-500 font-bold mb-8"></p><div class="space-y-5 border-t pt-8"><div class="flex items-center gap-4"><i data-lucide="smartphone" class="text-blue-600"></i><a id="ro-mobile" class="text-blue-600 font-black text-xl"></a></div></div></div></div>
</div>

<div id="section-cropper" class="hidden fixed inset-0 bg-black z-[2000] flex flex-col">
  <div class="p-4 flex justify-between text-white border-b border-slate-800"><button onclick="cancelCrop()">取消</button><button onclick="confirmCrop()" class="text-blue-500 font-black">完成</button></div>
  <div class="flex-1 flex items-center justify-center overflow-hidden"><img id="cropper-img" class="max-w-full max-h-full"></div>
</div>

<div id="toast" class="hidden fixed top-16 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-sm font-bold shadow-lg z-[10000]"></div>
<script src="card.js?v=20260416_2340"></script>
<script>lucide.createIcons();</script>
</body>
</html>
