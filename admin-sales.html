<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>店家管理中心</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #f8fafc; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
    .unified-nav { position: fixed; bottom: 0; width: 100%; max-width: 448px; background-color: #1e3a8a !important; display: flex; justify-content: space-around; align-items: center; z-index: 50; height: 76px; border-radius: 20px 20px 0 0; left: 50%; transform: translateX(-50%); box-shadow: 0 -10px 20px rgba(0,0,0,0.15); }
    .nav-btn { @apply flex flex-col items-center justify-center flex-1 text-blue-100/60 font-bold transition-all; }
    .nav-btn.nav-active { @apply text-white; }
    .nav-btn.nav-active .icon-box { @apply bg-white/20 p-1.5 rounded-xl; }
    .list-item { @apply flex items-center gap-4 px-5 py-4 bg-white border-b border-slate-100 active:bg-slate-50 transition-colors; }
    .section-header { @apply px-5 py-3 bg-slate-50 text-[12px] font-bold text-slate-400 uppercase tracking-widest flex justify-between; }
  </style>
</head>
<body class="flex flex-col items-center">
<div class="w-full max-w-md bg-white h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur px-5 py-4 flex justify-between items-center border-b border-slate-100">
    <div class="text-xl font-black text-slate-800">店家審核中心</div>
    <button onclick="loadAllSales()"><i data-lucide="refresh-cw" class="w-5 h-5 text-slate-400" id="refresh-icon"></i></button>
  </nav>

  <main class="flex-1 overflow-y-auto pb-32 pt-20">
    <div id="view-loading" class="h-64 flex flex-col items-center justify-center space-y-3">
      <div class="w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- BOX 1: 待審核 -->
    <section id="section-pending" class="hidden">
      <div class="section-header"><span>待審核名單</span><span id="count-pending" class="text-amber-500">0</span></div>
      <div id="container-pending"></div>
    </section>

    <!-- BOX 2: 已通過 -->
    <section id="section-approved" class="hidden">
      <div class="section-header"><span>合作店家總覽</span><span id="count-approved" class="text-blue-500">0</span></div>
      <div id="container-approved"></div>
    </section>

    <div id="view-empty" class="hidden py-20 text-center text-slate-400 font-bold">目前無註冊紀錄</div>
  </main>

  <nav id="bottom-nav-admin" class="unified-nav">
      <button onclick="window.location.href='index.html'" class="nav-btn"><div class="icon-box"><i data-lucide="calendar-check" class="w-6 h-6"></i></div><span class="text-[10px]">主頁</span></button>
      <button onclick="window.location.href='admin-sales.html'" class="nav-btn nav-active"><div class="icon-box"><i data-lucide="store" class="w-6 h-6"></i></div><span class="text-[10px]">店家</span></button>
      <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><i data-lucide="contact" class="w-6 h-6"></i></div><span class="text-[10px]">名片</span></button>
      <button onclick="window.location.href='profile.html'" class="nav-btn"><div class="icon-box"><i data-lucide="settings" class="w-6 h-6"></i></div><span class="text-[10px]">參數</span></button>
  </nav>
</div>

<script>
  const WORKER_URL = "https://salesmemager.fangwl591021.workers.dev/"; 
  window.fetchAPI = async (action, payload = {}) => {
    const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action, payload }) });
    const d = await res.json();
    if (!d.success) throw new Error(d.error);
    return d.data;
  };

  async function loadAllSales() {
    document.getElementById('view-loading').classList.remove('hidden');
    try {
      const list = await fetchAPI('getAllSales');
      const pending = list.filter(i => i.status === '審核中');
      const approved = list.filter(i => i.status === '已開通');
      
      document.getElementById('container-pending').innerHTML = pending.map(i => `<div class="list-item"><div class="flex-1"><h4 class="font-bold">${i.name}</h4><p class="text-xs text-slate-400">帳號: ${i.loginAccount}</p></div><button onclick="approveSales('${i.userId}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xs">開通</button></div>`).join('');
      document.getElementById('container-approved').innerHTML = approved.map(i => `<div class="list-item"><div class="flex-1"><h4 class="font-bold">${i.name}</h4><p class="text-xs text-slate-400">${i.registerTime} 加入</p></div><i data-lucide="check-circle" class="text-green-500 w-5 h-5"></i></div>`).join('');
      
      document.getElementById('section-pending').classList.toggle('hidden', pending.length===0);
      document.getElementById('section-approved').classList.remove('hidden');
      document.getElementById('count-pending').innerText = pending.length;
      document.getElementById('count-approved').innerText = approved.length;
      lucide.createIcons();
    } catch(e) { alert("讀取失敗"); }
    finally { document.getElementById('view-loading').classList.add('hidden'); }
  }

  async function approveSales(uid) {
    if(!confirm("確定開通權限？")) return;
    try {
      await fetchAPI('approveSales', { targetUid: uid });
      loadAllSales();
    } catch(e) { alert("操作失敗"); }
  }

  window.onload = async () => {
    await liff.init({ liffId: "2008924519-RslRiLoO" });
    loadAllSales();
  };
</script>
</body>
</html>
