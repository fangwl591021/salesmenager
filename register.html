<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
  <title>會員註冊</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script id="tailwind-config">
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2563eb", 
            "primary-light": "#eff6ff",
            background: "#f9fafb",
            "text-main": "#0f172a",
          },
          fontFamily: {
            headline: ["Manrope", "Noto Sans TC", "sans-serif"],
            sans: ["Inter", "Noto Sans TC", "sans-serif"],
          }
        },
      },
    };
  </script>
  
  <style type="text/tailwindcss">
    body { background-color: #f9fafb; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    .input-label { @apply block text-[13px] font-bold text-gray-500 mb-2 tracking-wider; }
    .custom-input { @apply w-full h-[50px] px-4 bg-white border border-gray-200 rounded-xl outline-none focus:border-primary/50 focus:ring-4 focus:ring-primary/10 transition-all font-medium text-gray-800 text-[15px] shadow-sm placeholder-gray-400; }
    select.custom-input { -webkit-appearance: none; appearance: none; }
    .btn-primary { @apply w-full py-4 bg-primary text-white rounded-xl font-bold text-[16px] shadow-md shadow-blue-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 hover:bg-blue-700; }
  </style>
</head>
<body class="font-sans text-text-main min-h-screen flex flex-col items-center bg-gray-50">

<div class="w-full max-w-md bg-background h-screen relative flex flex-col shadow-2xl overflow-hidden">
  
  <nav class="fixed top-0 w-full max-w-md z-40 bg-white/95 backdrop-blur-xl px-5 py-4 flex justify-center items-center border-b border-gray-200 shadow-sm">
    <div class="text-[19px] font-extrabold text-gray-800 flex items-center gap-2 font-headline tracking-tight">
      <i data-lucide="user-plus" class="w-6 h-6 text-primary"></i> 系統服務註冊
    </div>
  </nav>

  <main class="flex-1 overflow-y-auto pb-10 pt-24 px-5">
    <div id="view-loading" class="h-64 flex flex-col items-center justify-center space-y-4">
      <i data-lucide="loader-2" class="w-10 h-10 text-primary animate-spin"></i>
      <p class="text-gray-500 font-bold text-[14px] tracking-wider">讀取身分中...</p>
    </div>

    <div id="view-form" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
      
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
        <div class="flex items-center gap-4 mb-6 pb-6 border-b border-gray-100">
          <img id="user-avatar" src="" class="w-14 h-14 rounded-full object-cover border border-gray-200 shadow-sm">
          <div>
            <h3 class="text-lg font-black text-gray-800" id="user-display-name">載入中</h3>
            <p class="text-xs text-gray-500 font-medium mt-0.5">即將綁定此 LINE 帳號</p>
          </div>
        </div>

        <div class="space-y-5">
          <div class="flex flex-col w-full">
            <label class="input-label">真實姓名 <span class="text-red-500">*</span></label>
            <input type="text" id="reg-name" class="custom-input" placeholder="請輸入您的真實姓名">
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col w-full">
              <label class="input-label">性別</label>
              <div class="relative">
                <select id="reg-gender" class="custom-input pr-10">
                  <option value="男">男</option>
                  <option value="女">女</option>
                  <option value="其他">其他</option>
                </select>
                <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5 pointer-events-none"></i>
              </div>
            </div>
            <div class="flex flex-col w-full">
              <label class="input-label">手機號碼 <span class="text-red-500">*</span></label>
              <input type="tel" id="reg-phone" class="custom-input" placeholder="09xx...">
            </div>
          </div>

          <div class="flex flex-col w-full">
            <label class="input-label">產業類別</label>
            <input type="text" id="reg-industry" class="custom-input" placeholder="例如：資訊軟體、金融、餐飲...">
          </div>

          <div class="pt-4 border-t border-gray-100">
            <label class="input-label">註冊身分</label>
            <div class="grid grid-cols-2 gap-3">
              <label class="relative flex flex-col items-center justify-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-all [&:has(:checked)]:border-primary [&:has(:checked)]:bg-primary-light/50 group">
                <input type="radio" name="reg-role" value="user" class="peer sr-only" checked onchange="toggleSalesInput()">
                <i data-lucide="user" class="w-6 h-6 text-gray-400 group-[&:has(:checked)]:text-primary mb-2 transition-colors"></i>
                <span class="text-[14px] font-bold text-gray-600 group-[&:has(:checked)]:text-primary transition-colors">一般會員</span>
              </label>
              <label class="relative flex flex-col items-center justify-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-all [&:has(:checked)]:border-primary [&:has(:checked)]:bg-primary-light/50 group">
                <input type="radio" name="reg-role" value="sales" class="peer sr-only" onchange="toggleSalesInput()">
                <i data-lucide="store" class="w-6 h-6 text-gray-400 group-[&:has(:checked)]:text-primary mb-2 transition-colors"></i>
                <span class="text-[14px] font-bold text-gray-600 group-[&:has(:checked)]:text-primary transition-colors">合作店家</span>
              </label>
            </div>
          </div>

          <div id="sales-account-group" class="hidden flex flex-col w-full animate-in slide-in-from-top-2">
            <label class="input-label text-primary">自訂店家登入帳號 <span class="text-red-500">*</span></label>
            <input type="text" id="reg-login-account" class="custom-input border-primary/30 bg-primary-light/20" placeholder="限英數字，例如：store123">
            <p class="text-[11px] text-gray-500 mt-1.5 font-medium">※ 送出後需等待管理員審核開通，方可取得專屬分享連結。</p>
          </div>

        </div>
      </div>
      
      <button id="btn-submit" onclick="submitRegistration()" class="btn-primary">
        確認送出註冊
      </button>
    </div>

    <!-- 審核中畫面 -->
    <div id="view-pending" class="hidden h-64 flex flex-col items-center justify-center space-y-4 animate-in zoom-in-95">
      <div class="w-20 h-20 bg-amber-50 rounded-full flex items-center justify-center border-4 border-amber-100">
        <i data-lucide="clock" class="w-10 h-10 text-amber-500"></i>
      </div>
      <h2 class="text-[20px] font-black text-gray-800 tracking-tight">資料審核中</h2>
      <p class="text-[14px] text-gray-500 font-medium text-center px-4">您的店家申請已送出。<br>請稍候系統管理員進行開通作業。</p>
    </div>

  </main>
</div>

<div id="toast" class="hidden fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all z-[10000] font-bold flex items-center gap-2 w-max max-w-[90vw] opacity-0 pointer-events-none border border-gray-700"></div>

<script>
  const LIFF_ID = "2008924519-RslRiLoO"; 
  const WORKER_URL = "https://salesmemager.fangwl591021.workers.dev/"; 
  
  let userProfile = null;
  let referrerUid = '';
  let isProcessing = false;

  lucide.createIcons();

  window.showToast = function(msg, isError = false) {
    const t = document.getElementById('toast');
    if (!t) return;
    const iconName = isError ? 'alert-circle' : 'check-circle-2';
    t.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4"></i> ${msg}`;
    t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all font-bold flex items-center gap-2 w-max max-w-[90vw] ${isError ? 'bg-red-500 text-white border-red-600' : 'bg-gray-800 text-white border-gray-700'} opacity-100 z-[10000]`;
    t.classList.remove('hidden');
    lucide.createIcons({ root: t });
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; setTimeout(() => t.classList.add('hidden'), 300); }, 3000); 
  };

  async function fetchAPI(action, payload = {}) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    const response = await fetch(WORKER_URL, {
      method: 'POST', 
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action, payload }),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    const resText = await response.text();
    let result = JSON.parse(resText);
    if (!result.success) throw new Error(result.error);
    return result.data;
  }

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      
      const params = new URLSearchParams(window.location.search);
      referrerUid = params.get('referrer') || '';

      if (!liff.isLoggedIn()) { 
        liff.login({ redirectUri: window.location.href }); 
        return; 
      }
      
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-display-name').innerText = userProfile.displayName;

      // 檢查是否已註冊
      const userRes = await fetchAPI('checkUser', { userId: userProfile.userId });
      if (userRes.isRegistered) {
         if (userRes.info['角色'] === 'sales' && userRes.info['審核狀態'] === '審核中') {
             document.getElementById('view-loading').classList.add('hidden');
             document.getElementById('view-pending').classList.remove('hidden');
         } else {
             window.location.replace('index.html');
         }
         return;
      }

      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('view-form').classList.remove('hidden');
      
    } catch (err) {
      showToast("初始化失敗：" + err.message, true);
    }
  });

  function toggleSalesInput() {
    const role = document.querySelector('input[name="reg-role"]:checked').value;
    const salesGroup = document.getElementById('sales-account-group');
    if (role === 'sales') {
      salesGroup.classList.remove('hidden');
    } else {
      salesGroup.classList.add('hidden');
      document.getElementById('reg-login-account').value = '';
    }
  }

  async function submitRegistration() {
    if (isProcessing) return;

    const name = document.getElementById('reg-name').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const gender = document.getElementById('reg-gender').value;
    const industry = document.getElementById('reg-industry').value.trim();
    const role = document.querySelector('input[name="reg-role"]:checked').value;
    const loginAccount = document.getElementById('reg-login-account').value.trim();

    if (!name) return showToast("請輸入真實姓名", true);
    if (!phone) return showToast("請輸入手機號碼", true);
    if (role === 'sales' && !loginAccount) return showToast("合作店家必須設定登入帳號", true);
    if (role === 'sales' && !/^[a-zA-Z0-9]+$/.test(loginAccount)) return showToast("登入帳號限用英數字", true);

    const btn = document.getElementById('btn-submit');
    const oriText = btn.innerHTML;
    btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 處理中...';
    lucide.createIcons({ root: btn });
    btn.classList.add('pointer-events-none', 'opacity-70');
    isProcessing = true;

    try {
      const payload = {
        userId: userProfile.userId,
        name: name,
        phone: phone,
        gender: gender,
        industry: industry,
        role: role,
        loginAccount: loginAccount,
        referrer: referrerUid
      };

      const res = await fetchAPI('registerUser', payload);
      
      if (res.role === 'sales') {
         document.getElementById('view-form').classList.add('hidden');
         document.getElementById('view-pending').classList.remove('hidden');
         showToast("✅ 店家申請已送出");
      } else {
         showToast("🎉 註冊成功！即將跳轉主頁...", false);
         setTimeout(() => { window.location.replace('index.html'); }, 1500);
      }

    } catch (err) {
      showToast(err.message, true);
      btn.innerHTML = oriText;
      btn.classList.remove('pointer-events-none', 'opacity-70');
    } finally {
      isProcessing = false;
    }
  }
</script>
</body>
</html>
