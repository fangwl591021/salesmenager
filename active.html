<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>建立活動 - ACTMASTER</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        body { background-color: #F3F4F6; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .input-label { @apply block text-sm text-gray-500 mb-1.5 font-medium pl-1; }
        .custom-input { @apply w-full h-12 px-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/20 transition-all text-[15px] text-gray-800 placeholder-gray-400; }
        .textarea-block { @apply w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/20 transition-all text-[15px] text-gray-800 resize-none leading-relaxed placeholder-gray-400; }
        select.custom-input { -webkit-appearance: none; appearance: none; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col relative pb-16">

    <!-- 頂部導航 -->
    <header class="bg-white px-4 py-3 shadow-sm sticky top-0 z-50 flex items-center justify-between border-b border-gray-100">
        <h1 class="text-lg font-semibold tracking-wide text-gray-900 flex items-center gap-2">
            建立活動 <span class="text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-medium">V2</span>
        </h1>
        <button onclick="window.location.href='index.html'" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-500 active:scale-95 transition-transform">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-4">
        
        <!-- 載入中狀態 -->
        <div id="view-loading" class="h-64 flex flex-col items-center justify-center space-y-3">
            <div class="w-8 h-8 border-4 border-gray-200 border-t-blue-500 rounded-full animate-spin"></div>
            <p class="text-sm text-gray-500 font-medium">權限驗證中...</p>
        </div>

        <div id="form-content" class="hidden animate-in fade-in duration-300 space-y-4 pb-20">
            
            <!-- 分頁切換器 -->
            <div class="flex p-1 bg-gray-100/80 rounded-xl mb-2">
                <button id="tab-btn-quick" onclick="switchTab('quick')" class="flex-1 py-2 rounded-lg text-sm font-medium bg-white text-blue-600 shadow-sm transition-all">快速匯入</button>
                <button id="tab-btn-full" onclick="switchTab('full')" class="flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 transition-all hover:text-gray-700 bg-transparent">完整發佈</button>
                <button id="tab-btn-series" onclick="switchTab('series')" class="flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 transition-all hover:text-gray-700 bg-transparent">系列梯次</button>
            </div>

            <!-- Tab 1: 快速匯入 -->
            <div id="tab-content-quick" class="space-y-4 bg-white p-5 rounded-2xl shadow-sm">
                <div class="flex flex-col">
                    <label class="input-label">活動名稱</label>
                    <input type="text" id="q-name" class="custom-input" placeholder="例如：2026 商務交流會">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col">
                        <label class="input-label">開始時間</label>
                        <input type="datetime-local" id="q-start" class="custom-input text-[13px] px-2">
                    </div>
                    <div class="flex flex-col">
                        <label class="input-label">結束時間</label>
                        <input type="datetime-local" id="q-end" class="custom-input text-[13px] px-2">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col">
                        <label class="input-label">活動類型</label>
                        <select id="q-type" class="custom-input"><option>例會</option><option>課程</option><option>教學</option><option>聯誼</option><option>參訪</option><option>講座</option><option>其他</option></select>
                    </div>
                    <div class="flex flex-col">
                        <label class="input-label">預設身份</label>
                        <select id="q-identity" class="custom-input"><option>會員</option><option>來賓</option></select>
                    </div>
                </div>

                <div class="flex flex-col">
                    <label class="input-label">收費方式</label>
                    <div class="flex items-center gap-6 p-3 bg-gray-50 rounded-xl">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="q-fee-type" value="免費" checked onchange="toggleFeeInput('q')" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <span class="text-sm font-medium text-gray-700">免費</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="q-fee-type" value="收費" onchange="toggleFeeInput('q')" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <span class="text-sm font-medium text-gray-700">收費</span>
                        </label>
                    </div>
                    <div id="q-price-box" class="hidden mt-2 relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-gray-400">NT$</span>
                        <input type="number" id="q-price" class="custom-input pl-12" placeholder="輸入金額">
                    </div>
                </div>

                <div class="flex flex-col">
                    <label class="input-label flex justify-between">活動說明 <span class="text-[11px] text-gray-400 font-normal">(選填)</span></label>
                    <textarea id="q-desc" class="textarea-block h-24" placeholder="輸入活動詳細說明..."></textarea>
                </div>

                <div class="flex flex-col">
                    <label class="input-label">名單內容 (每行一位)</label>
                    <textarea id="q-names" class="textarea-block h-32" placeholder="王小明&#10;李小華"></textarea>
                </div>
                
                <div class="flex flex-col">
                    <label class="input-label">活動宣傳圖 <span class="text-[11px] text-gray-400 font-normal">(自動壓縮)</span></label>
                    <div onclick="document.getElementById('file-input-quick').click()" class="w-full h-32 border border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center bg-gray-50 cursor-pointer overflow-hidden relative">
                        <div id="preview-placeholder-quick" class="text-center text-gray-400 z-10 flex flex-col items-center">
                            <i data-lucide="image-plus" class="w-8 h-8 mb-1"></i>
                            <span class="text-xs font-medium">點擊上傳</span>
                        </div>
                        <img id="image-preview-quick" class="hidden w-full h-full object-cover absolute inset-0 z-0">
                    </div>
                    <input type="hidden" id="in-image-url-quick">
                    <input type="file" id="file-input-quick" accept="image/*" class="hidden" onchange="openCropper(this, 'quick')">
                </div>
                
                <button onclick="handleSubmit('quick')" id="btn-submit-quick" class="w-full mt-4 py-3.5 bg-blue-600 text-white rounded-xl font-medium text-[15px] shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2">建立並匯入名單</button>
            </div>

            <!-- Tab 2: 完整發佈 -->
            <div id="tab-content-full" class="hidden space-y-4 bg-white p-5 rounded-2xl shadow-sm">
                <!-- 結構與 Quick 類似，簡化展示 -->
                <div class="flex flex-col">
                    <label class="input-label">活動宣傳圖</label>
                    <div onclick="document.getElementById('file-input-full').click()" class="w-full h-32 border border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center bg-gray-50 cursor-pointer overflow-hidden relative">
                        <div id="preview-placeholder-full" class="text-center text-gray-400 z-10 flex flex-col items-center"><i data-lucide="image-plus" class="w-8 h-8 mb-1"></i><span class="text-xs">點擊上傳</span></div>
                        <img id="image-preview-full" class="hidden w-full h-full object-cover absolute inset-0 z-0">
                    </div>
                    <input type="hidden" id="in-image-url-full"><input type="file" id="file-input-full" accept="image/*" class="hidden" onchange="openCropper(this, 'full')">
                </div>

                <div class="flex flex-col"><label class="input-label">活動標題</label><input type="text" id="f-name" class="custom-input" placeholder="輸入活動標題"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col"><label class="input-label">開始時間</label><input type="datetime-local" id="f-start" class="custom-input text-[13px] px-2"></div>
                    <div class="flex flex-col"><label class="input-label">結束時間</label><input type="datetime-local" id="f-end" class="custom-input text-[13px] px-2"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col"><label class="input-label">活動類型</label><select id="f-type" class="custom-input"><option>例會</option><option>課程</option><option>其他</option></select></div>
                    <div class="flex flex-col"><label class="input-label">預設身份</label><select id="f-identity" class="custom-input"><option>會員</option><option>來賓</option></select></div>
                </div>
                <div class="flex flex-col">
                    <label class="input-label">收費方式</label>
                    <div class="flex items-center gap-6 p-3 bg-gray-50 rounded-xl">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="f-fee-type" value="免費" checked onchange="toggleFeeInput('f')" class="w-4 h-4 text-blue-600"><span class="text-sm font-medium">免費</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="f-fee-type" value="收費" onchange="toggleFeeInput('f')" class="w-4 h-4 text-blue-600"><span class="text-sm font-medium">收費</span></label>
                    </div>
                    <div id="f-price-box" class="hidden mt-2 relative"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-gray-400">NT$</span><input type="number" id="f-price" class="custom-input pl-12" placeholder="輸入金額"></div>
                </div>
                <div class="flex flex-col"><label class="input-label">活動說明</label><textarea id="f-desc" class="textarea-block h-32" placeholder="輸入活動詳細說明..."></textarea></div>
                
                <button onclick="handleSubmit('full')" id="btn-submit-full" class="w-full mt-4 py-3.5 bg-blue-600 text-white rounded-xl font-medium text-[15px] shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2">確認發佈</button>
            </div>

            <!-- Tab 3: 系列梯次 -->
            <div id="tab-content-series" class="hidden space-y-4 bg-white p-5 rounded-2xl shadow-sm">
                <!-- 結構簡化展示 -->
                <div class="flex flex-col">
                    <label class="input-label">系列總封面圖</label>
                    <div onclick="document.getElementById('file-input-series').click()" class="w-full h-32 border border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center bg-gray-50 cursor-pointer overflow-hidden relative">
                        <div id="preview-placeholder-series" class="text-center text-gray-400 z-10 flex flex-col items-center"><i data-lucide="image-plus" class="w-8 h-8 mb-1"></i><span class="text-xs">點擊上傳</span></div>
                        <img id="image-preview-series" class="hidden w-full h-full object-cover absolute inset-0 z-0">
                    </div>
                    <input type="hidden" id="in-image-url-series"><input type="file" id="file-input-series" accept="image/*" class="hidden" onchange="openCropper(this, 'series')">
                </div>

                <div class="flex flex-col"><label class="input-label">系列總標題</label><input type="text" id="s-name" class="custom-input" placeholder="例如：2026 商務進階系列"></div>
                <div class="flex flex-col"><label class="input-label">活動總說明</label><textarea id="s-desc" class="textarea-block h-24" placeholder="輸入總體說明..."></textarea></div>

                <div class="pt-4 border-t border-gray-100">
                    <div class="flex justify-between items-center mb-3">
                        <label class="input-label !mb-0 text-blue-600">梯次設定</label>
                        <button onclick="addBatchRow()" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-medium active:scale-95 transition-all flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4"></i>新增一場</button>
                    </div>
                    <div id="batch-container" class="space-y-3"></div>
                </div>
                
                <button onclick="handleSubmit('series')" id="btn-submit-series" class="w-full mt-4 py-3.5 bg-blue-600 text-white rounded-xl font-medium text-[15px] shadow-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2">建立系列活動</button>
            </div>

        </div>
    </main>

    <!-- 底部導覽列 -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around pb-safe pt-2 z-40">
        <a href="index.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-gray-600">
            <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px]">主頁</span>
        </a>
        <a href="active.html" class="flex flex-col items-center p-2 text-blue-600">
            <i data-lucide="calendar" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px]">活動</span>
        </a>
        <a href="card.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-gray-600">
            <i data-lucide="users" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px]">人脈</span>
        </a>
        <a href="fate.html" class="flex flex-col items-center p-2 text-gray-400 hover:text-gray-600">
            <i data-lucide="sparkles" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px]">命理</span>
        </a>
        <a href="javascript:void(0)" onclick="alert('分享功能即將推出')" class="flex flex-col items-center p-2 text-gray-400 hover:text-gray-600">
            <i data-lucide="share-2" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px]">分享</span>
        </a>
    </nav>

    <!-- 圖片裁切彈窗 -->
    <div id="section-image-cropper" class="hidden fixed inset-0 bg-black/95 flex flex-col w-full z-[100] animate-in fade-in">
        <div class="flex justify-between items-center p-4 text-white border-b border-gray-800">
            <button onclick="cancelCrop()" class="px-3 py-2 text-gray-400 text-sm">取消</button>
            <span class="text-sm font-medium">裁切圖片</span>
            <button onclick="confirmCrop()" class="px-4 py-1.5 bg-blue-600 rounded-lg text-sm font-medium">完成</button>
        </div>
        <div class="flex-1 relative flex items-center justify-center overflow-hidden">
            <img id="cropper-image" class="max-w-full max-h-full block opacity-0 transition-opacity">
        </div>
    </div>

    <script>
        const LIFF_ID = "2008924519-RslRiLoO";
        const WORKER_URL = "https://salesmemager.fangwl591021.workers.dev/";
        const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"];
        
        let batchCount = 0;
        let currentCropTarget = '';
        let cropperInstance = null;
        let userProfile = null;
        let isProcessing = false;

        lucide.createIcons();

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { 
                    liff.login({ redirectUri: window.location.href }); 
                    return; 
                }
                
                userProfile = await liff.getProfile();
                
                if (!ADMIN_IDS.includes(userProfile.userId)) { 
                    showToast("無權限存取建立活動頁面", "error");
                    setTimeout(() => window.location.href = 'index.html', 1500);
                    return; 
                }
                
                addBatchRow();
                document.getElementById('view-loading').classList.add('hidden');
                document.getElementById('form-content').classList.remove('hidden');
            } catch(e) { 
                console.warn(e);
                showToast("LINE 初始化失敗，已啟動預覽模式");
                userProfile = { userId: ADMIN_IDS[0], displayName: "管理員預覽" };
                addBatchRow();
                document.getElementById('view-loading').classList.add('hidden');
                document.getElementById('form-content').classList.remove('hidden');
            }
        });

        // 自訂 Toast 提示 (取代 alert)
        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-500' : (type === 'success' ? 'bg-green-500' : 'bg-gray-800');
            toast.className = `fixed top-16 left-1/2 transform -translate-x-1/2 ${bgColor} text-white px-5 py-2.5 rounded-full shadow-lg z-[100] text-sm font-medium transition-all duration-300 flex items-center gap-2`;
            
            let iconStr = '<i data-lucide="info" class="w-4 h-4"></i>';
            if(type === 'error') iconStr = '<i data-lucide="alert-circle" class="w-4 h-4"></i>';
            if(type === 'success') iconStr = '<i data-lucide="check-circle" class="w-4 h-4"></i>';
            
            toast.innerHTML = `${iconStr} ${msg}`;
            document.body.appendChild(toast);
            lucide.createIcons({root: toast});
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function switchTab(tabId) {
            ['quick', 'full', 'series'].forEach(id => {
                document.getElementById(`tab-content-${id}`).classList.add('hidden');
                const btn = document.getElementById(`tab-btn-${id}`);
                btn.className = 'flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 transition-all hover:text-gray-700 bg-transparent';
            });
            document.getElementById(`tab-content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-btn-${tabId}`).className = 'flex-1 py-2 rounded-lg text-sm font-medium bg-white text-blue-600 shadow-sm transition-all';
        }

        function toggleFeeInput(prefix) {
            const feeRadio = document.querySelector(`input[name="${prefix}-fee-type"]:checked`);
            const priceBox = document.getElementById(`${prefix}-price-box`);
            if(!feeRadio || !priceBox) return;
            if (feeRadio.value === '收費') priceBox.classList.remove('hidden');
            else { priceBox.classList.add('hidden'); document.getElementById(`${prefix}-price`).value = ''; }
        }

        function addBatchRow(defaultValues = null, insertAfterId = null) {
            batchCount++;
            const container = document.getElementById('batch-container');
            const rowId = `batch-${batchCount}`;
            const html = `
            <div id="${rowId}" class="bg-gray-50 p-3 rounded-xl relative border border-gray-100">
                <div class="absolute top-2 right-2 flex gap-1 z-10">
                    <button onclick="copyBatchRow('${rowId}')" class="w-7 h-7 bg-white text-blue-500 rounded-full flex items-center justify-center shadow-sm"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
                    ${batchCount > 1 || insertAfterId ? `<button onclick="document.getElementById('${rowId}').remove()" class="w-7 h-7 bg-white text-red-400 rounded-full flex items-center justify-center shadow-sm"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>` : ''}
                </div>
                <input type="text" id="${rowId}-name" class="custom-input !h-10 !bg-white !mb-2 !pr-16 batch-name-input" placeholder="梯次名稱" value="${defaultValues ? defaultValues.name : ''}">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="datetime-local" id="${rowId}-start" class="custom-input !h-10 !bg-white !text-xs !px-2 batch-start-input" value="${defaultValues ? defaultValues.start : ''}">
                    <input type="datetime-local" id="${rowId}-end" class="custom-input !h-10 !bg-white !text-xs !px-2 batch-end-input" value="${defaultValues ? defaultValues.end : ''}">
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-medium text-gray-500 ml-1">收費 NT$</span>
                    <input type="number" id="${rowId}-price" class="custom-input !h-10 !bg-white batch-price-input" placeholder="0" value="${defaultValues ? defaultValues.price : ''}">
                </div>
            </div>`;
            if (insertAfterId) document.getElementById(insertAfterId).insertAdjacentHTML('afterend', html);
            else container.insertAdjacentHTML('beforeend', html);
            lucide.createIcons({ root: document.getElementById(rowId) });
        }

        function copyBatchRow(sourceId) {
            addBatchRow({ 
                name: document.getElementById(`${sourceId}-name`).value + ' (複製)', 
                start: document.getElementById(`${sourceId}-start`).value, 
                end: document.getElementById(`${sourceId}-end`).value, 
                price: document.getElementById(`${sourceId}-price`).value 
            }, sourceId);
        }

        function openCropper(input, targetMode) {
            const file = input.files[0]; if (!file) return;
            currentCropTarget = targetMode; 
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('cropper-image'); 
                img.onload = () => {
                    document.getElementById('section-image-cropper').classList.remove('hidden');
                    if (cropperInstance) cropperInstance.destroy();
                    img.style.opacity = '1';
                    cropperInstance = new Cropper(img, { aspectRatio: NaN, viewMode: 1, dragMode: 'crop', autoCropArea: 0.9, guides: true, center: true, highlight: false }); 
                };
                img.src = e.target.result; 
                img.style.opacity = '0';
                input.value = ""; 
            }; 
            reader.readAsDataURL(file); 
        }

        function cancelCrop() { 
            if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; } 
            document.getElementById('section-image-cropper').classList.add('hidden'); 
            const img = document.getElementById('cropper-image');
            if(img) { img.removeAttribute('src'); img.style.opacity = '0'; }
        }

        function confirmCrop() { 
            if (!cropperInstance) return; 
            let size = 250, quality = 0.6;
            let base64 = cropperInstance.getCroppedCanvas({ maxWidth: size, maxHeight: size }).toDataURL('image/jpeg', quality); 
            while (base64.length > 48000 && quality > 0.1) {
               quality -= 0.1;
               base64 = cropperInstance.getCroppedCanvas({ maxWidth: size, maxHeight: size }).toDataURL('image/jpeg', quality);
            }
            if (base64.length > 49000) {
                cancelCrop();
                return showToast("圖片內容太複雜無法壓縮", "error");
            }
            cancelCrop(); 
            const modeId = currentCropTarget;
            document.getElementById(`image-preview-${modeId}`).src = base64; 
            document.getElementById(`image-preview-${modeId}`).classList.remove('hidden'); 
            document.getElementById(`preview-placeholder-${modeId}`).classList.add('hidden'); 
            document.getElementById(`in-image-url-${modeId}`).value = base64; 
        }

        const formatDT = (val) => val ? val.replace('T', ' ') : '';

        async function handleSubmit(mode) { 
            if(isProcessing) return; 
            
            const pfx = mode === 'quick' ? 'q' : (mode === 'full' ? 'f' : 's');
            const nameInput = document.getElementById(`${pfx}-name`);
            const name = nameInput ? nameInput.value.trim() : '';
            if(!name) { showToast('請填寫活動名稱/標題', 'error'); return nameInput?.focus(); }

            const btnId = `btn-submit-${mode}`;
            const btn = document.getElementById(btnId);
            const oriText = btn ? btn.innerHTML : '建立';
            isProcessing = true;
            
            if (btn) {
                btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 處理中...';
                lucide.createIcons({ root: btn });
                btn.disabled = true;
                btn.classList.add('opacity-70');
            }

            let p = { 
                activityName: name,
                activityType: document.getElementById(`${pfx}-type`)?.value || '例會', 
                feeType: '免費', price: 0,
                startTime: formatDT(document.getElementById(`${pfx}-start`)?.value),
                endTime: formatDT(document.getElementById(`${pfx}-end`)?.value),
                description: document.getElementById(`${pfx}-desc`)?.value.trim() || '',
                imageUrl: document.getElementById(`in-image-url-${mode}`)?.value || '',
                names: [],
                defaultIdentity: document.getElementById(`${pfx}-identity`)?.value || '來賓',
                isBatch: (mode === 'series'),
                userId: userProfile.userId 
            }; 
            
            if(mode === 'quick' || mode === 'full') {
                const feeRadio = document.querySelector(`input[name="${pfx}-fee-type"]:checked`);
                p.feeType = feeRadio ? feeRadio.value : '免費';
                p.price = document.getElementById(`${pfx}-price`)?.value || '';
                
                if(p.feeType === '收費' && (!p.price || p.price <= 0)) {
                    isProcessing=false; if(btn){btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70');} 
                    return showToast("請輸入正確的收費金額", "error");
                }
                
                if (mode === 'quick') {
                    const namesStr = document.getElementById('q-names')?.value || '';
                    p.names = namesStr.split('\n').filter(n=>n.trim()); 
                }
            } else if(mode === 'series') {
                const cards = document.querySelectorAll('[id^="batch-"]');
                p.batches = Array.from(cards).filter(card => card.id.match(/^batch-\d+$/)).map(card => ({
                    name: card.querySelector('.batch-name-input').value.trim(),
                    startTime: formatDT(card.querySelector('.batch-start-input').value),
                    endTime: formatDT(card.querySelector('.batch-end-input').value),
                    price: card.querySelector('.batch-price-input').value,
                    limit: ''
                }));
                
                if(p.batches.length === 0) { isProcessing=false; if(btn){btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70');} return showToast("至少需新增一個梯次", "error"); }
                for(let b of p.batches) { if(!b.name) { isProcessing=false; if(btn){btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70');} return showToast("梯次名稱必填", "error"); } }
                
                p.startTime = p.batches[0].startTime;
                p.endTime = p.batches[p.batches.length - 1].endTime;
                const hasPaid = p.batches.some(b => parseInt(b.price) > 0);
                if (hasPaid) { p.feeType = '收費'; p.price = Math.max(...p.batches.map(b => parseInt(b.price) || 0)); }
            }
            
            try { 
                const response = await fetch(WORKER_URL, { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'bulkAddRegistrants', payload: p }) 
                });
                const res = await response.json();
                if (!res.success) throw new Error(res.error);

                showToast('活動建立成功！即將跳轉...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch(e) { 
                showToast('建立失敗：' + e.message, 'error');
            } finally {
                if(btn) { btn.innerHTML = oriText; btn.disabled = false; btn.classList.remove('opacity-70'); }
                isProcessing = false;
            }
        }
    </script>
</body>
</html>
