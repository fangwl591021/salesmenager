<script>
  const LIFF_ID = "2008924519-RslRiLoO"; 
  const WORKER_URL = "https://salesmemager.fangwl591021.workers.dev"; 
  
  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let globalPublicActivities = [], currentActivities = [], currentRegistrants = [], activeActivityName = '';
  let globalCrmData = [], filteredCrmData = [], crmPageLimit = 10, currentCrmViewCount = 10, isProcessing = false;
  let allSalesData = [], currentCrmSubTab = 'member';

  function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      if (!t) return;
      t.innerHTML = `<span class="material-symbols-outlined icon-filled">${isError ? 'error' : 'info'}</span> ${msg}`;
      t.className = `fixed top-14 left-1/2 -translate-x-1/2 px-5 py-3 rounded-full text-[14px] shadow-lg transition-all font-bold flex items-center gap-2 w-max max-w-[90vw] ${isError ? 'bg-red-500 text-white border-red-600' : 'bg-slate-800 text-white border-slate-700'} opacity-100 z-[10000]`;
      t.classList.remove('hidden');
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -1rem)'; setTimeout(() => t.classList.add('hidden'), 300); }, 3000); 
  }

  function setButtonLoading(btnId, isLoading, originalText = '') {
      const btn = document.getElementById(btnId); if (!btn) return false;
      if (isLoading) {
          if (!btn.dataset.oriText) btn.dataset.oriText = btn.innerHTML;
          btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px] align-middle">refresh</span>';
          btn.classList.add('opacity-50', 'pointer-events-none');
          return true;
      } else {
          btn.innerHTML = originalText || btn.dataset.oriText || '送出';
          btn.classList.remove('opacity-50', 'pointer-events-none');
          return false;
      }
  }

  async function fetchAPI(action, payload = {}, useCache = false) {
    const cacheKey = action + JSON.stringify(payload);
    if (useCache) {
      const cachedStr = sessionStorage.getItem(cacheKey);
      if (cachedStr) {
        try {
          const cachedData = JSON.parse(cachedStr);
          fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) }).then(r => r.text()).then(resText => { try { const res = JSON.parse(resText); if (res.success) sessionStorage.setItem(cacheKey, JSON.stringify(res.data)); } catch(e) {} }).catch(e => console.log('Cache update failed', e));
          return cachedData;
        } catch(e) { sessionStorage.removeItem(cacheKey); }
      }
    }
    
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 20000); 
      const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }), signal: controller.signal });
      clearTimeout(timeoutId);
      const resText = await response.text();
      let result; try { result = JSON.parse(resText); } catch(e) { throw new Error(`伺服器回應異常`); }
      if (!result.success) throw new Error(result.error);
      if (useCache) sessionStorage.setItem(cacheKey, JSON.stringify(result.data));
      return result.data;
    } catch (err) { 
      if (err.name === 'AbortError') err.message = '連線已經超時 (20秒)，請檢查網路狀態。';
      throw err; 
    }
  }

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      userProfile = await liff.getProfile();
      if(document.getElementById('user-avatar')) document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      if(document.getElementById('user-profile-badge')) document.getElementById('user-profile-badge').classList.remove('hidden');
      
      const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 
      isAdmin = ADMIN_IDS.includes(userProfile.userId);

      const initData = await fetchAPI('initApp', { userId: userProfile.userId, reqContacts: true, reqActivities: true }, true);
      const res = initData.user || { isRegistered: false };
      isRegistered = res.isRegistered; registeredInfo = res.info; globalCardContacts = initData.contacts || [];
      if (isAdmin) currentActivities = initData.activities || []; else globalPublicActivities = initData.activities || [];

      if(document.getElementById('view-loading')) document.getElementById('view-loading').classList.add('hidden'); 
      
      if (isAdmin) {
        if(document.getElementById('role-switch-btn')) document.getElementById('role-switch-btn').classList.remove('hidden');
        if(document.getElementById('header-admin-badge')) document.getElementById('header-admin-badge').classList.remove('hidden');
        isViewModeAdmin = true; switchView('admin-activities');
      } else {
        if (isRegistered) {
          if (registeredInfo['角色'] === 'sales' && registeredInfo['審核狀態'] === '審核中') {
              window.location.replace('register.html');
              return;
          }
          switchView('user-activities'); 
        } else { 
          window.location.replace('register.html');
          return;
        }
      }
    } catch (err) { 
      if(document.getElementById('view-loading')) document.getElementById('view-loading').classList.add('hidden');
      const container = document.getElementById('main-content');
      if (container) container.innerHTML = `<div class="bg-red-50 p-6 mx-4 mt-10 rounded-2xl text-red-600 font-bold">${err.message}</div>`;
    }
  };

  window.toggleRoleMode = function() {
    isViewModeAdmin = !isViewModeAdmin;
    const badge = document.getElementById('header-admin-badge'); if(badge) badge.classList.toggle('hidden', !isViewModeAdmin);
    if (isViewModeAdmin) switchView('admin-activities'); else switchView(isRegistered ? 'user-activities' : '');
  }

  window.switchView = function(view) {
    if(!view) return;
    ['view-loading', 'view-user-activities', 'view-user-history', 'view-admin-activities', 'view-admin-stats', 'view-admin-crm', 'view-admin-settings'].forEach(v => { const el = document.getElementById(v); if(el) el.classList.add('hidden'); });
    const activeEl = document.getElementById(`view-${view}`); if (activeEl) activeEl.classList.remove('hidden');
    const navAdmin = document.getElementById('bottom-nav-admin'); const navUser = document.getElementById('bottom-nav-user');
    if(navAdmin) navAdmin.classList.add('hidden'); if(navUser) navUser.classList.add('hidden');
    
    if (isAdmin && isViewModeAdmin && view.startsWith('admin')) {
      if(navAdmin) navAdmin.classList.remove('hidden');
      let highlightView = view === 'admin-stats' ? 'admin-activities' : view;
      ['activities', 'create', 'crm', 'fate', 'cards', 'settings'].forEach(k => { 
          const btn = document.getElementById('nav-admin-'+k); 
          if(btn) btn.className = `nav-btn ${highlightView===('admin-'+k) ? 'nav-active' : ''}`; 
      });
    } else if (isRegistered && (!isAdmin || !isViewModeAdmin) && view.startsWith('user')) {
      if(navUser) navUser.classList.remove('hidden');
      ['activities', 'history', 'profile', 'fate'].forEach(k => { 
          const btn = document.getElementById('nav-user-'+k); 
          if(btn) btn.className = `nav-btn ${view===('user-'+k) ? 'nav-active' : ''}`; 
      });
    }
    
    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'admin-stats') loadAdminStats();
    else if (view === 'admin-settings') loadAdminSettings();
    else if (view === 'admin-crm') loadCrmData();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-history') loadUserHistory();
  }

  // --- CRM & Sales Audit Logic ---
  window.switchCrmSubTab = function(tab) {
      currentCrmSubTab = tab;
      const tabMember = document.getElementById('crm-tab-member');
      const tabSales = document.getElementById('crm-tab-sales');
      const sectionMember = document.getElementById('crm-member-section');
      const sectionSales = document.getElementById('crm-sales-section');

      if (tab === 'member') {
          tabMember.className = "crm-sub-tab crm-sub-tab-active";
          tabSales.className = "crm-sub-tab crm-sub-tab-inactive";
          sectionMember.classList.remove('hidden');
          sectionSales.classList.add('hidden');
          loadCrmData();
      } else {
          tabSales.className = "crm-sub-tab crm-sub-tab-active";
          tabMember.className = "crm-sub-tab crm-sub-tab-inactive";
          sectionSales.classList.remove('hidden');
          sectionMember.classList.add('hidden');
          loadSalesList();
      }
  }

  async function loadCrmData() { 
    const list = document.getElementById('admin-crm-list-container'); if(!list) return;
    list.innerHTML = '<div class="text-center py-10"><div class="w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full animate-spin mx-auto"></div></div>'; 
    try { globalCrmData = await fetchAPI('getAllCrmData', {}, true); filteredCrmData = [...globalCrmData]; currentCrmViewCount = crmPageLimit; renderCrmList(); } catch(e) { list.innerHTML = `<p class="text-center text-red-400 font-bold py-10">載入失敗</p>`; }
  }

  function renderCrmList() {
    const list = document.getElementById('admin-crm-list-container'); const moreBtnBox = document.getElementById('crm-load-more-box');
    if(!list) return;
    if(!filteredCrmData.length) { if(moreBtnBox) moreBtnBox.classList.add('hidden'); list.innerHTML = `<div class="text-center text-slate-400 py-16 text-[14px]">查無會員</div>`; return; }
    const displayItems = filteredCrmData.slice(0, currentCrmViewCount);
    let html = displayItems.map((r, i) => `
        <div class="px-5 py-4 flex justify-between items-center border-b border-slate-50 last:border-b-0 active:bg-slate-50 transition-colors">
            <div class="flex items-center gap-4">
                <span class="text-[13px] text-slate-400 font-bold w-6 text-center">${i + 1}</span>
                <div class="flex flex-col">
                    <span class="text-[16px] text-slate-800 font-bold">${r.name}</span>
                    <span class="text-[11px] text-slate-400 uppercase tracking-tight">VIP Member</span>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[16px] font-black text-primary">${r.attended} <span class="text-[12px] font-medium text-slate-500">次</span></span>
                <span class="text-[10px] text-slate-400 font-bold uppercase mt-0.5">出席總計</span>
            </div>
        </div>`).join('');
    list.innerHTML = html;
    if(moreBtnBox) { if (filteredCrmData.length > currentCrmViewCount) moreBtnBox.classList.remove('hidden'); else moreBtnBox.classList.add('hidden'); }
  }

  async function loadSalesList() {
      const list = document.getElementById('admin-sales-list-container'); if(!list) return;
      list.innerHTML = '<div class="text-center py-10"><div class="w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full animate-spin mx-auto"></div></div>'; 
      try {
          allSalesData = await fetchAPI('getSalesList', {});
          renderSalesList();
      } catch(e) { list.innerHTML = `<p class="text-center text-red-400 font-bold py-10">讀取失敗</p>`; }
  }

  function renderSalesList() {
      const container = document.getElementById('admin-sales-list-container'); if(!container) return;
      if(allSalesData.length === 0) { container.innerHTML = '<div class="text-center py-16 text-slate-400 font-bold">目前無經銷商申請資料</div>'; return; }
      
      container.innerHTML = allSalesData.map(s => {
          const isPending = s.status === '審核中';
          const inviteUrl = `https://liff.line.me/${LIFF_ID}/?referrer=${s.userId}`;
          return `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative animate-in fade-in">
              <div class="flex justify-between items-start mb-2">
                  <h3 class="text-[17px] font-black text-gray-800">${s.name}</h3>
                  <span class="text-[11px] font-bold px-2 py-1 rounded-md ${isPending ? 'bg-amber-50 text-amber-600' : 'bg-green-50 text-green-600'}">${s.status}</span>
              </div>
              <div class="space-y-1.5 mt-3">
                  <p class="text-[13px] text-gray-500 flex items-center gap-2"><span class="material-symbols-outlined text-[18px] text-slate-300">smartphone</span> ${s.phone || '無'}</p>
                  <p class="text-[13px] text-gray-500 flex items-center gap-2"><span class="material-symbols-outlined text-[18px] text-slate-300">key</span> 登入帳號：<span class="font-bold text-slate-700">${s.loginAccount || '無'}</span></p>
                  <p class="text-[11px] text-gray-400 mt-1 uppercase tracking-wider">申請時間：${s.createdAt}</p>
              </div>
              <div class="flex gap-2 mt-4 pt-4 border-t border-slate-50">
                  ${isPending ? `
                    <button onclick="updateSalesAuditStatus('${s.userId}', '已退回')" class="flex-1 py-2.5 bg-slate-100 text-slate-600 rounded-xl font-bold text-[13px] active:scale-95 transition-all">退回</button>
                    <button onclick="updateSalesAuditStatus('${s.userId}', '已開通')" class="flex-1 py-2.5 bg-[#06C755] text-white rounded-xl font-bold text-[13px] active:scale-95 transition-all shadow-sm">准許開通</button>
                  ` : `
                    <button onclick="updateSalesAuditStatus('${s.userId}', '已退回')" class="w-12 h-10 bg-red-50 text-red-600 rounded-xl flex items-center justify-center shrink-0 active:scale-90"><span class="material-symbols-outlined text-[20px]">block</span></button>
                    <button onclick="copySalesInviteLink('${inviteUrl}')" class="flex-1 py-2.5 bg-slate-800 text-white rounded-xl font-bold text-[13px] flex items-center justify-center gap-1.5 active:scale-95 transition-all"><span class="material-symbols-outlined text-[18px]">content_copy</span> 複製專屬推廣連結</button>
                  `}
              </div>
          </div>`;
      }).join('');
  }

  window.updateSalesAuditStatus = async function(userId, newStatus) {
      if(!confirm(`確定要將狀態更改為「${newStatus}」嗎？`)) return;
      isProcessing = true;
      try {
          await fetchAPI('updateSalesStatus', { userId: userId, status: newStatus });
          showToast(`✅ 狀態已變更為：${newStatus}`);
          loadSalesList();
      } catch(e) { showToast(e.message, true); } finally { isProcessing = false; }
  }

  window.copySalesInviteLink = function(url) {
      const temp = document.createElement('textarea'); temp.value = url; document.body.appendChild(temp); temp.select();
      try { document.execCommand('copy'); showToast("✅ 網址已複製"); } catch(e) { alert(url); }
      document.body.removeChild(temp);
  }

  // --- Common Logic ---
  async function loadAdminActivities() { 
    const list = document.getElementById('admin-activity-list-container'); if(!list) return;
    if (currentActivities && currentActivities.length > 0) { renderActivityList(currentActivities, 'admin'); return; }
    list.innerHTML = '<div class="text-center py-10"><div class="w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full animate-spin mx-auto"></div></div>'; 
    try { currentActivities = await fetchAPI('getActivityDashboard', {}, true); renderActivityList(currentActivities, 'admin'); } catch (e) { list.innerHTML = `<p class="text-center text-red-400 font-bold py-10">載入失敗</p>`; }
  }

  function renderActivityList(data, mode) {
    const list = document.getElementById(mode === 'user' ? 'user-activities-container' : 'admin-activity-list-container');
    if (!list) return;
    let html = data.map(a => `
        <div class="bg-white rounded-[2rem] shadow-sm p-6 border border-slate-100 mb-4 animate-in fade-in">
          <div class="flex justify-between items-start mb-5">
            <div><span class="text-[11px] font-bold text-primary bg-primary-light px-2.5 py-0.5 rounded-md uppercase mb-2 inline-block">${a.type}</span><h3 class="font-extrabold text-[18px] text-slate-800">${a.name}</h3></div>
          </div>
          <div class="flex gap-3"><button onclick="switchView('admin-activities')" class="flex-1 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold text-[14px]">查看名單</button></div>
        </div>`).join('');
    list.innerHTML = html;
  }

  async function loadAdminSettings() { 
      const s = await fetchAPI('getSettings'); 
      const t1 = document.getElementById('set-tg-token'); if(t1) t1.value = s.TG_BOT_TOKEN || ''; 
      const t2 = document.getElementById('set-tg-chat'); if(t2) t2.value = s.TG_CHAT_ID || ''; 
      const l = document.getElementById('set-line-link'); if(l) l.value = s.LINE_LINK || ''; 
  }
  
  window.submitSettings = async function() { 
    if(isProcessing) return; isProcessing = true; setButtonLoading('btn-submit-settings', true);
    try { await fetchAPI('saveSettings', { TG_BOT_TOKEN: document.getElementById('set-tg-token').value, TG_CHAT_ID: document.getElementById('set-tg-chat').value, LINE_LINK: document.getElementById('set-line-link').value }); showToast('已儲存'); } catch(e) { showToast("儲存失敗", true); } finally { isProcessing = false; setButtonLoading('btn-submit-settings', false, '儲存設定'); }
  }

  function filterCrmList() {
      const term = document.getElementById('crm-search-input').value.toLowerCase();
      filteredCrmData = globalCrmData.filter(u => u.name.toLowerCase().includes(term));
      currentCrmViewCount = crmPageLimit; renderCrmList();
  }
  function loadMoreCrm() { currentCrmViewCount += crmPageLimit; renderCrmList(); }

</script>
</body>
</html>
