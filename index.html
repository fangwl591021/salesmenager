<script>
  const LIFF_ID = "2008924519-RslRiLoO"; 
  const WORKER_URL = "https://salesmemager.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 

  let userProfile = null, isAdmin = false, isViewModeAdmin = false, isRegistered = false, registeredInfo = null;
  let globalPublicActivities = [], currentActivities = [], currentRegistrants = [], activeActivityName = '';
  let globalCrmData = [], filteredCrmData = [], crmPageLimit = 10, currentCrmViewCount = 10, isProcessing = false;
  let allSalesData = [], currentCrmSubTab = 'member';

  async function fetchAPI(action, payload = {}, useCache = false) {
    const cacheKey = action + JSON.stringify(payload);
    if (useCache) {
      const cachedStr = sessionStorage.getItem(cacheKey);
      if (cachedStr) {
        try {
          const cachedData = JSON.parse(cachedStr);
          fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) }).then(r => r.text()).then(resText => { try { const res = JSON.parse(resText); if (res.success) sessionStorage.setItem(cacheKey, JSON.stringify(res.data)); } catch(e) {} }).catch(e => console.log('Cache update failed', e));
          return cachedData;
        } catch(e) { sessionStorage.removeItem(cacheKey); }
      }
    }
    try {
      const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) });
      const result = await response.json();
      if (!result.success) throw new Error(result.error);
      if (useCache) sessionStorage.setItem(cacheKey, JSON.stringify(result.data));
      return result.data;
    } catch (err) { throw err; }
  }

  window.onload = async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userProfile = await liff.getProfile();
      if(document.getElementById('user-avatar')) document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      isAdmin = ADMIN_IDS.includes(userProfile.userId);
      const initData = await fetchAPI('initApp', { userId: userProfile.userId, reqContacts: true, reqActivities: true }, true);
      const res = initData.user || { isRegistered: false };
      isRegistered = res.isRegistered; registeredInfo = res.info; globalCardContacts = initData.contacts || [];
      if (isAdmin) currentActivities = initData.activities || []; else globalPublicActivities = initData.activities || [];
      document.getElementById('view-loading').classList.add('hidden');
      if (isAdmin) {
        isViewModeAdmin = true; document.getElementById('header-admin-badge').classList.remove('hidden'); document.getElementById('role-switch-btn').classList.remove('hidden');
        switchView('admin-activities');
      } else if (isRegistered) {
        if (registeredInfo['角色'] === 'sales' && registeredInfo['審核狀態'] === '審核中') window.location.replace('register.html');
        else switchView('user-activities');
      } else { window.location.replace('register.html'); }
    } catch (err) {
      document.getElementById('view-loading').innerHTML = `<div class="bg-red-50 p-6 mx-4 rounded-2xl text-red-600 font-bold">${err.message}</div>`;
    }
  };

  window.toggleRoleMode = function() {
    isViewModeAdmin = !isViewModeAdmin;
    document.getElementById('header-admin-badge').classList.toggle('hidden', !isViewModeAdmin);
    if (isViewModeAdmin) switchView('admin-activities'); else switchView('user-activities');
  }

  window.switchView = function(view) {
    ['view-loading', 'view-user-activities', 'view-user-history', 'view-admin-activities', 'view-admin-stats', 'view-admin-crm', 'view-admin-settings'].forEach(v => document.getElementById(v)?.classList.add('hidden'));
    document.getElementById(`view-${view}`)?.classList.remove('hidden');
    const nA = document.getElementById('bottom-nav-admin'); const nU = document.getElementById('bottom-nav-user');
    nA.classList.add('hidden'); nU.classList.add('hidden');
    if (isAdmin && isViewModeAdmin && view.startsWith('admin')) {
      nA.classList.remove('hidden');
      ['activities', 'create', 'crm', 'fate', 'cards', 'settings'].forEach(k => { const b = document.getElementById('nav-admin-'+k); if(b) b.className = `nav-btn ${view.includes(k) ? 'nav-active' : ''}`; });
    } else {
      nU.classList.remove('hidden');
      ['activities', 'history', 'profile', 'fate'].forEach(k => { const b = document.getElementById('nav-user-'+k); if(b) b.className = `nav-btn ${view.includes(k) ? 'nav-active' : ''}`; });
    }
    if (view === 'admin-activities') loadAdminActivities();
    else if (view === 'admin-crm') switchCrmSubTab(currentCrmSubTab);
    else if (view === 'admin-stats') loadAdminStats();
    else if (view === 'admin-settings') loadAdminSettings();
    else if (view === 'user-activities') loadUserActivities();
    else if (view === 'user-history') loadUserHistory();
  }

  window.switchCrmSubTab = function(tab) {
      currentCrmSubTab = tab;
      const tM = document.getElementById('crm-tab-member'), tS = document.getElementById('crm-tab-sales');
      const sM = document.getElementById('crm-member-section'), sS = document.getElementById('crm-sales-section');
      if (tab === 'member') {
          tM.className = "crm-sub-tab crm-sub-tab-active"; tS.className = "crm-sub-tab crm-sub-tab-inactive";
          sM.classList.remove('hidden'); sS.classList.add('hidden'); loadCrmData();
      } else {
          tS.className = "crm-sub-tab crm-sub-tab-active"; tM.className = "crm-sub-tab crm-sub-tab-inactive";
          sS.classList.remove('hidden'); sM.classList.add('hidden'); loadSalesList();
      }
  }

  async function loadAdminActivities() {
    const list = document.getElementById('admin-activity-list-container');
    list.innerHTML = '<div class="text-center py-10"><div class="w-8 h-8 border-4 border-slate-200 border-t-primary rounded-full animate-spin mx-auto"></div></div>';
    try { currentActivities = await fetchAPI('getActivityDashboard', {}, true); renderActivityList(currentActivities, 'admin'); } catch(e) { list.innerHTML = `<p class="text-center text-red-400 py-10">載入失敗</p>`; }
  }

  function renderActivityList(data, mode) {
    const list = document.getElementById(mode === 'user' ? 'user-activities-container' : 'admin-activity-list-container');
    if (!list) return;
    list.innerHTML = data.map(a => `
        <div class="bg-white rounded-[1.5rem] shadow-sm p-5 border border-slate-100 mb-4">
          <div class="flex justify-between items-start mb-4">
            <div><span class="text-[10px] font-bold text-primary bg-primary-light px-2 py-0.5 rounded uppercase mb-1 inline-block">${a.type}</span><h3 class="font-extrabold text-[17px] text-slate-800">${a.name}</h3></div>
            <div class="text-right"><p class="text-[10px] text-slate-400 font-bold uppercase">已簽到</p><p class="text-[18px] font-black text-primary">${a.attended}</p></div>
          </div>
          <div class="flex gap-2 pt-4 border-t border-slate-50">
            <button onclick="toggleActivityStatus('${a.name}')" class="flex-1 py-2.5 bg-slate-50 text-slate-600 rounded-xl font-bold text-[13px] active:scale-95 transition-all">${a.status === '上架' ? '下架' : '上架'}</button>
            <button onclick="openAdminRegistrants('${a.name}')" class="flex-1 py-2.5 bg-slate-800 text-white rounded-xl font-bold text-[13px] active:scale-95 transition-all shadow-sm">名單核銷</button>
          </div>
        </div>`).join('');
  }

  async function loadCrmData() {
    const list = document.getElementById('admin-crm-list-container');
    list.innerHTML = '<div class="text-center py-10 animate-pulse text-slate-400 font-bold">讀取會員資料中...</div>';
    try { globalCrmData = await fetchAPI('getAllCrmData', {}, true); filteredCrmData = [...globalCrmData]; currentCrmViewCount = crmPageLimit; renderCrmList(); } catch(e) { list.innerHTML = `<p class="text-center text-red-400 py-10">資料讀取失敗</p>`; }
  }

  function renderCrmList() {
    const list = document.getElementById('admin-crm-list-container');
    if(!list) return;
    const displayItems = filteredCrmData.slice(0, currentCrmViewCount);
    list.innerHTML = displayItems.map((r, i) => `
        <div class="px-5 py-4 flex justify-between items-center border-b border-slate-50 last:border-0 active:bg-slate-50 transition-colors">
            <div class="flex items-center gap-4">
                <span class="text-[12px] text-slate-300 font-bold w-4">${i + 1}</span>
                <div class="flex flex-col"><span class="text-[16px] text-slate-800 font-bold">${r.name}</span><span class="text-[10px] text-slate-400 uppercase tracking-tight font-bold">Member</span></div>
            </div>
            <div class="text-right"><span class="text-[16px] font-black text-primary">${r.attended} <span class="text-[10px] font-bold text-slate-400 ml-0.5">次出席</span></span></div>
        </div>`).join('');
    document.getElementById('crm-load-more-box')?.classList.toggle('hidden', filteredCrmData.length <= currentCrmViewCount);
  }

  async function loadSalesList() {
      const list = document.getElementById('admin-sales-list-container');
      list.innerHTML = '<div class="text-center py-10 animate-pulse text-slate-400 font-bold">載入申請名單中...</div>';
      try { allSalesData = await fetchAPI('getSalesList', {}); renderSalesList(); } catch(e) { list.innerHTML = `<p class="text-center text-red-400 py-10">讀取失敗，請重新整理</p>`; }
  }

  function renderSalesList() {
      const container = document.getElementById('admin-sales-list-container');
      if(allSalesData.length === 0) { container.innerHTML = '<div class="text-center py-16 text-slate-400 font-bold">目前無經銷商申請</div>'; return; }
      container.innerHTML = allSalesData.map(s => {
          const isPending = s.status === '審核中';
          const inviteUrl = `https://liff.line.me/${LIFF_ID}/?referrer=${s.userId}`;
          return `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 animate-in fade-in">
              <div class="flex justify-between items-center mb-4">
                  <h3 class="text-[17px] font-black text-gray-800">${s.name}</h3>
                  <span class="text-[10px] font-bold px-2 py-0.5 rounded ${isPending ? 'bg-amber-50 text-amber-600' : 'bg-green-50 text-green-600'}">${s.status}</span>
              </div>
              <div class="space-y-1 mb-4">
                  <p class="text-[13px] text-slate-500 font-medium flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">smartphone</span> ${s.phone || '無'}</p>
                  <p class="text-[13px] text-slate-500 font-medium flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">key</span> 帳號：<span class="font-bold text-slate-700">${s.loginAccount || '無'}</span></p>
              </div>
              <div class="flex gap-2 pt-4 border-t border-slate-50">
                  ${isPending ? `
                    <button onclick="updateSalesAuditStatus('${s.userId}', '已退回')" class="flex-1 py-2 bg-slate-50 text-slate-400 rounded-lg font-bold text-[13px]">退回</button>
                    <button onclick="updateSalesAuditStatus('${s.userId}', '已開通')" class="flex-1 py-2 bg-[#06C755] text-white rounded-lg font-bold text-[13px] shadow-sm">核准開通</button>
                  ` : `
                    <button onclick="updateSalesAuditStatus('${s.userId}', '已退回')" class="w-10 h-10 bg-red-50 text-red-400 rounded-lg flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-[18px]">block</span></button>
                    <button onclick="copySalesInviteLink('${inviteUrl}')" class="flex-1 py-2 bg-slate-800 text-white rounded-lg font-bold text-[13px] flex items-center justify-center gap-1.5"><span class="material-symbols-outlined text-[16px]">content_copy</span> 複製推廣連結</button>
                  `}
              </div>
          </div>`;
      }).join('');
  }

  window.updateSalesAuditStatus = async function(userId, newStatus) {
      if(!confirm(`確定要變更為「${newStatus}」？`)) return;
      try { await fetchAPI('updateSalesStatus', { userId, status: newStatus }); showToast("狀態已變更"); loadSalesList(); } catch(e) { showToast("變更失敗", true); }
  }

  window.copySalesInviteLink = function(url) {
      const t = document.createElement('textarea'); t.value = url; document.body.appendChild(t); t.select();
      try { document.execCommand('copy'); showToast("網址已複製"); } catch(e) { alert(url); }
      document.body.removeChild(t);
  }

  window.openAdminRegistrants = async function(name) {
      activeActivityName = name; document.getElementById('admin-reg-title').innerText = name;
      const m = document.getElementById('admin-registrants-modal'); m.classList.remove('hidden');
      const list = document.getElementById('admin-reg-list'); list.innerHTML = '<div class="text-center py-10 animate-pulse text-slate-400">讀取名單中...</div>';
      try { currentRegistrants = await fetchAPI('getRegistrants', { activityName: name }); renderAdminRegList(currentRegistrants); } catch(e) { list.innerHTML = "讀取失敗"; }
  }
  window.closeAdminRegistrants = function() { document.getElementById('admin-registrants-modal').classList.add('hidden'); }

  function renderAdminRegList(data) {
      const list = document.getElementById('admin-reg-list');
      if(!data.length) { list.innerHTML = '<div class="text-center py-16 text-slate-400">目前無人報名</div>'; return; }
      list.innerHTML = data.map(r => `
          <div class="bg-white p-4 rounded-2xl shadow-sm mb-3 flex justify-between items-center border border-slate-100">
              <div><h4 class="font-bold text-slate-800">${r['姓名']}</h4><p class="text-[11px] text-slate-400">${r['電話'] || '無電話'}</p></div>
              <button onclick="toggleCheckIn(this, ${r.rowId}, ${r.checkedIn})" class="px-4 py-1.5 rounded-lg font-bold text-[12px] ${r.checkedIn ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500'}">${r.checkedIn ? '已簽到' : '簽到'}</button>
          </div>`).join('');
  }

  async function toggleCheckIn(btn, rowId, status) {
      try { await fetchAPI('toggleStatus', { activityName: activeActivityName, rowId, currentStatus: status }); openAdminRegistrants(activeActivityName); } catch(e) { showToast("簽到失敗", true); }
  }

  async function toggleActivityStatus(name) {
      try { await fetchAPI('toggleActivityStatus', { activityName: name }); loadAdminActivities(); showToast("狀態已更新"); } catch(e) { showToast("操作失敗", true); }
  }
