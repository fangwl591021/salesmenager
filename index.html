<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACTMASTER 主頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f9fafb; -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 🚀 統一導覽列：深藍底白字 */
        .unified-nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 448px;
            background-color: #1e3a8a !important; display: flex; justify-content: space-around; 
            align-items: center; padding: 8px 4px; z-index: 50; height: 76px;
            border-top: 1px solid #172554; border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.15); left: 50%; transform: translateX(-50%);
        }
        .nav-btn { @apply flex flex-col items-center justify-center flex-1 text-blue-100/60 font-bold transition-all; }
        .nav-btn .icon-box { @apply p-1.5 rounded-xl; }
        .nav-btn.nav-active { @apply text-white; }
        .nav-btn.nav-active .icon-box { @apply bg-white/20; }
        .nav-text { font-size: 10px; margin-top: 2px; }

        /* LINE 原生資訊流卡片 */
        .act-card { @apply bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-4; }
    </style>
</head>
<body class="font-sans text-gray-800 min-h-screen flex flex-col items-center bg-gray-50">

    <div class="w-full max-w-md bg-background h-screen relative flex flex-col shadow-2xl overflow-hidden">
        
        <header class="bg-white/95 backdrop-blur-xl px-5 py-4 shadow-sm sticky top-0 z-50 flex items-center justify-between border-b border-gray-100">
            <h1 id="page-title" class="text-[19px] font-extrabold text-gray-800 tracking-tight flex items-center gap-2">服務主頁</h1>
            <div id="user-profile" class="w-9 h-9 rounded-full bg-gray-100 overflow-hidden shadow-sm">
                <img id="profile-img" src="" alt="" class="w-full h-full object-cover hidden">
            </div>
        </header>

        <main id="main-content" class="flex-1 overflow-y-auto hide-scrollbar p-5 pb-28">
            <!-- 載入中 -->
            <div id="view-loading" class="h-64 flex flex-col items-center justify-center space-y-3">
                <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs font-bold text-slate-400">正在同步雲端資料...</p>
            </div>

            <!-- 管理核銷畫面 -->
            <div id="view-admin-activities" class="hidden animate-in fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black text-slate-800">管理核銷</h2>
                    <button class="bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-sm">
                        <i data-lucide="bar-chart-3" class="w-4 h-4"></i> 營運統計
                    </button>
                </div>
                <div id="admin-activity-list"></div>
            </div>
        </main>

        <nav id="bottom-nav-admin" class="hidden unified-nav pb-safe">
            <button onclick="switchView('admin-activities')" class="nav-btn nav-active" id="nav-btn-activities"><div class="icon-box"><i data-lucide="calendar-check" class="w-6 h-6"></i></div><span class="nav-text">核銷</span></button>
            <button onclick="window.location.href='active.html'" class="nav-btn"><div class="icon-box"><i data-lucide="plus-circle" class="w-6 h-6"></i></div><span class="nav-text">建立</span></button>
            <button onclick="window.location.href='admin-sales.html'" class="nav-btn"><div class="icon-box"><i data-lucide="store" class="w-6 h-6"></i></div><span class="nav-text">店家</span></button>
            <button onclick="window.location.href='card.html'" class="nav-btn"><div class="icon-box"><i data-lucide="contact" class="w-6 h-6"></i></div><span class="nav-text">名片</span></button>
            <button onclick="window.location.href='profile.html'" class="nav-btn"><div class="icon-box"><i data-lucide="settings" class="w-6 h-6"></i></div><span class="nav-text">設定</span></button>
        </nav>
    </div>

    <script>
        const LIFF_ID = "2008924519-RslRiLoO";
        const WORKER_URL = "https://salesmemager.fangwl591021.workers.dev/";
        
        lucide.createIcons();

        async function fetchAPI(action, payload = {}) {
            const response = await fetch(WORKER_URL, {
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action, payload })
            });
            const result = await response.json();
            if (!result.success) throw new Error(result.error);
            return result.data;
        }

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                
                if (profile.pictureUrl) {
                    const img = document.getElementById('profile-img');
                    img.src = profile.pictureUrl; img.classList.remove('hidden');
                }

                const data = await fetchAPI('initApp', { userId: profile.userId });
                if(!data.user.isRegistered) { window.location.replace('register.html'); return; }

                renderAdminDashboard(data.activities);
                
                document.getElementById('view-loading').classList.add('hidden');
                document.getElementById('view-admin-activities').classList.remove('hidden');
                document.getElementById('bottom-nav-admin').classList.remove('hidden');
                lucide.createIcons();

            } catch (err) { console.error(err); }
        }

        function renderAdminDashboard(activities) {
            const container = document.getElementById('admin-activity-list');
            container.innerHTML = activities.map(act => `
                <div class="act-card">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="bg-green-50 text-green-600 px-2 py-0.5 rounded text-[10px] font-bold">${act.type}</span>
                            <h3 class="text-xl font-black text-slate-800 mt-1">${act.name}</h3>
                        </div>
                        <div class="bg-slate-50 p-2 rounded-xl flex items-center gap-1.5 text-slate-400">
                           <i data-lucide="users" class="w-4 h-4"></i> <span class="text-xs font-bold">${act.regCount}</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 bg-slate-50/50 rounded-2xl p-4 mb-6">
                        <div class="text-center">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">狀態</p>
                            <p class="text-sm font-black ${act.status==='上架'?'text-green-500':'text-slate-400'}">${act.status}</p>
                        </div>
                        <div class="text-center border-x border-slate-100">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">已到</p>
                            <p class="text-sm font-black text-green-600">${act.arrivedCount}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">取消</p>
                            <p class="text-sm font-black text-red-500">${act.cancelledCount}</p>
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button class="flex-1 py-3.5 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm active:scale-95 transition-all">下架</button>
                        <button class="flex-[1.5] py-3.5 bg-slate-800 text-white rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">名單核銷</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons({ root: container });
        }

        window.onload = initLiff;
    </script>
</body>
</html>
